# ============================================================================
# BCMS — Scenario S1: SHA-256 Alternative (v8-optimized)
# الهدف: إبراز فرق الأداء الحقيقي تحت ضغط عالي باستخدام SHA-256
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-v8
  description: >
    High-performance benchmark to evaluate SHA-256 behavior under stress,
    batching, and increased concurrency.
  workers:
    type: local
    number: 20    # ⬅️ تقليل العمال لزيادة استقرار CouchDB

  rounds:
    # 🔹 Warm-up
    - label: Warmup
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 60
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # 🔥 High Load
    - label: IssueCertificate-HighLoad
      description: Linear ramp stress test
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # 🔥 Stress Test
    - label: Stress-Test
      description: Maximum throughput test
      txDuration: 120
      rateControl:
        type: fixed-rate
        opts:
          tps: 350
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ⚡ Verify
    - label: VerifyCertificate
      description: High-rate read test
      txDuration: 120
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ⚡ Query
    - label: QueryAllCertificates
      description: Ledger scan under load
      txDuration: 120
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # 🧱 Revoke
    - label: RevokeCertificate
      description: Write operation under load
      txDuration: 120
      rateControl:
        type: fixed-rate
        opts:
          tps: 80
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com