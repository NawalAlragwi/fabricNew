test:
  name: bcms-s-hybrid-batch-tps150
  description: 'Scenario S4 Hybrid-Batch at 150 TPS target (UNIFIED CONFIG)'
  workers:
    type: local
    number: 4
  rounds:
    - label: IssueCertificate
      description: 'Issue batch certs at 22 TPS, 60s'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 22
      workload:
        module: workload/issueCertificateBatch.js
        arguments:
          contractId: bcms-hybrid-batch
          batchSize: 10
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: HashOnlyBenchmark
      description: 'PURE CPU ROUND - isolate crypto overhead'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-hybrid-batch
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: VerifyCertificate
      description: 'PRIMARY ROUND - linear 30->150 TPS, 120s'
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 30
          finishingTps: 150
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-hybrid-batch
          totalIssued: 1320
          certPrefix: BCERT
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com

monitors:
  resource:
    - module: docker
      options:
        interval: 5
        cpuUsageNormalization: true
        containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - compose-couchdb0-1
          - compose-couchdb1-1
