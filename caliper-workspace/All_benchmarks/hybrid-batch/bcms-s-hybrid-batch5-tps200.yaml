test:
  name: bcms-s-hybrid-batch5-tps200
  description: 'Scenario S4 Hybrid-Batch at 200 TPS target with batch size 5'
  workers:
    type: local
    number: 4
  rounds:
    - label: IssueCertificate
      description: 'Issue batch certs at 30 TPS, 60s'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/issueCertificateBatch.js
        arguments:
          contractId: bcms-hybrid-batch
          batchSize: 5
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: HashOnlyBenchmark
      description: 'PURE CPU ROUND - isolate crypto overhead'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-hybrid-batch
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: VerifyCertificate
      description: 'PRIMARY ROUND - linear 40->200 TPS, 120s'
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 40
          finishingTps: 200
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-hybrid-batch
          totalIssued: 1800
          certPrefix: BCERT
          batchSize: 5
      txOptions:
        invokerIdentity: User1@org1.example.com

monitors:
  resource:
    - module: docker
      options:
        interval: 5
        cpuUsageNormalization: true
                containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - compose-couchdb0-1
          - compose-couchdb1-1