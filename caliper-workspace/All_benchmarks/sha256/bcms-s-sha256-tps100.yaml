test:
  name: bcms-s-sha256-tps100
  description: 'SHA-256 at 100 TPS. MagnificationFactor x3000 = 45ms per tx.'
  workers:
    type: local
    number: 4
  rounds:
    - label: IssueCertificate
      description: 'Issue certs at 15 TPS, 60s'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: HashOnlyBenchmark
      description: 'PURE CPU — SHA-256: 15us x 3000 = 45ms/tx'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-sha256
          payload: 'benchmark-payload-20kb'
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: VerifyCertificate
      description: 'PRIMARY ROUND — sha256 linear 20->100 TPS, 120s'
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 20
          finishingTps: 100
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 900
      txOptions:
        invokerIdentity: User1@org1.example.com

monitors:
  resource:
    - module: docker
      options:
        interval: 5
        cpuUsageNormalization: true
        containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - compose-couchdb0-1
          - compose-couchdb1-1
