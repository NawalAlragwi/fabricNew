test:
  name: bcms-s-sha256-tps200
  description: >
    Scenario sha256 at 200 TPS target (UNIFIED CONFIG).
    VerifyCertificate: linear 40->200 TPS (PRIMARY ROUND).
    MagnificationFactor x3000 = 45ms per tx (no SIMD).
    workers=4, txDuration unified: Issue=60s, Verify=120s.

  workers:
    type: local
    number: 4

  rounds:
    - label: IssueCertificate
      description: 'Issue certs at 30 TPS, 60s — unified config'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: HashOnlyBenchmark
      description: >
        PURE CPU ROUND — Hash only, zero ledger I/O.
        Fixed 10 TPS — isolates cryptographic algorithm performance.
        SHA-256: 15us x 3000 = 45ms/tx vs BLAKE3: 4us x 3000 = 12ms/tx
        Speedup ratio: 3.74x in favor of BLAKE3.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-sha256
          payload: 'benchmark-payload-20kb'
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — sha256 linear 40->200 TPS, 120s.
        MagnificationFactor x3000 = 45ms per tx (no SIMD).
        Unified config — compare directly with all algorithms.
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 40
          finishingTps: 200
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 1800
      txOptions:
        invokerIdentity: User1@org1.example.com

monitors:
  resource:
    - module: docker
      options:
        interval: 5
        cpuUsageNormalization: true
                containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - compose-couchdb0-1
          - compose-couchdb1-1