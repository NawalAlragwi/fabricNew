test:
  name: bcms-s-sha256-tps50
  description: 'SHA-256 at 50 TPS. MagnificationFactor x3000 = 45ms per tx.'
  workers:
    type: local
    number: 4
  rounds:
    - label: IssueCertificate
      description: 'Issue certs at 8 TPS, 60s'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 8
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: HashOnlyBenchmark
      description: 'PURE CPU — SHA-256: 15us x 3000 = 45ms/tx'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-sha256
          payload: 'benchmark-payload-20kb'
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: VerifyCertificate
      description: 'PRIMARY ROUND — sha256 linear 10->50 TPS, 120s'
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 10
          finishingTps: 50
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 480
      txOptions:
        invokerIdentity: User1@org1.example.com
