name: bcms-s-sha256-tps50
description: >
  Scenario sha256 at 50 TPS target (UNIFIED CONFIG).
  VerifyCertificate: linear 10->50 TPS (PRIMARY ROUND).
  MagnificationFactor x3000 = 45ms per tx (no SIMD).
  workers=4, txDuration unified: Issue=60s, Verify=120s.

workers:
  type: local
  number: 4

rounds:
  - label: IssueCertificate
    description: 'Issue certs at 8 TPS, 60s — unified config'
    txDuration: 60
    rateControl:
      type: fixed-rate
      opts:
        tps: 8
    workload:
      module: workload/issueCertificate.js
      arguments:
        contractId: bcms-sha256
        payloadSize: 20000
    txOptions:
      invokerIdentity: User1@org1.example.com

  - label: VerifyCertificate
    description: >
      PRIMARY ROUND — sha256 linear 10->50 TPS, 120s.
      MagnificationFactor x3000 = 45ms per tx (no SIMD).
      Unified config — compare directly with all algorithms.
    txDuration: 120
    rateControl:
      type: linear-rate
      opts:
        startingTps: 10
        finishingTps: 50
    workload:
      module: workload/verifyCertificate.js
      arguments:
        contractId: bcms-sha256
        totalIssued: 480
    txOptions:
      invokerIdentity: User1@org1.example.com
