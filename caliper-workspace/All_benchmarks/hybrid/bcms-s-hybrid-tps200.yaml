test:
  name: bcms-s-hybrid-tps200
  description: 'Scenario hybrid at 200 TPS target (UNIFIED CONFIG). VerifyCertificate:
    linear 40->200 TPS (PRIMARY ROUND). MagnificationFactor x3000 = 45ms per tx (SHA-256
    + BLAKE3). workers=4, txDuration unified: Issue=60s, Verify=120s.

    '
  workers:
    type: local
    number: 4
  rounds:
  - label: IssueCertificate
    description: "Issue certs at 30 TPS, 60s \u2014 unified config"
    txDuration: 60
    rateControl:
      type: fixed-rate
      opts:
        tps: 30
    workload:
      module: workload/issueCertificate.js
      arguments:
        contractId: bcms-hybrid
        payloadSize: 20000
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: HashOnlyBenchmark
    description: HashOnlyBenchmark pure CPU test
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/hashOnlyBenchmark.js
      arguments:
        contractId: bcms-hybrid
        payloadSize: 20000
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: VerifyCertificate
    description: "PRIMARY ROUND \u2014 hybrid linear 40->200 TPS, 120s. MagnificationFactor\
      \ x3000 = 45ms per tx (SHA-256 + BLAKE3). Unified config \u2014 compare directly\
      \ with all algorithms.\n"
    txDuration: 120
    rateControl:
      type: linear-rate
      opts:
        startingTps: 40
        finishingTps: 200
    workload:
      module: workload/verifyCertificate.js
      arguments:
        contractId: bcms-hybrid
        totalIssued: 1800
    txOptions:
      invokerIdentity: User1@org1.example.com

monitors:
  resource:
    - module: docker
      options:
        interval: 5
        cpuUsageNormalization: true
                containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - compose-couchdb0-1
          - compose-couchdb1-1