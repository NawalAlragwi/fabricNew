test:
  name: bcms-s-hybrid-tps100
  description: >
    Scenario hybrid at 100 TPS target (UNIFIED CONFIG).
    VerifyCertificate: linear 20->100 TPS (PRIMARY ROUND).
    MagnificationFactor x3000 = 45ms per tx (SHA-256 + BLAKE3).
    workers=4, txDuration unified: Issue=60s, Verify=120s.

  workers:
    type: local
    number: 4

  rounds:
    - label: IssueCertificate
      description: 'Issue certs at 15 TPS, 60s — unified config'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-hybrid
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — hybrid linear 20->100 TPS, 120s.
        MagnificationFactor x3000 = 45ms per tx (SHA-256 + BLAKE3).
        Unified config — compare directly with all algorithms.
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 20
          finishingTps: 100
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-hybrid
          totalIssued: 900
      txOptions:
        invokerIdentity: User1@org1.example.com
