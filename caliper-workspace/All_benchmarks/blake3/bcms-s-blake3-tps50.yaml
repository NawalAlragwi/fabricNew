name: bcms-s-blake3-tps50
description: >
  Scenario blake3 at 50 TPS target (UNIFIED CONFIG).
  VerifyCertificate: linear 10->50 TPS (PRIMARY ROUND).
  MagnificationFactor x3000 = 12ms per tx (AVX2 SIMD).
  workers=4, txDuration unified: Issue=60s, Verify=120s.

workers:
  type: local
  number: 4

rounds:
  - label: IssueCertificate
    description: 'Issue certs at 8 TPS, 60s — unified config'
    txDuration: 60
    rateControl:
      type: fixed-rate
      opts:
        tps: 8
    workload:
      module: workload/issueCertificate.js
      arguments:
        contractId: bcms-blake3
        payloadSize: 20000
    txOptions:
      invokerIdentity: User1@org1.example.com

  - label: HashOnlyBenchmark
    description: >
      PURE CPU ROUND — Hash only, zero ledger I/O.
      Fixed 10 TPS — isolates cryptographic algorithm performance.
      BLAKE3: 4us x 3000 = 12ms/tx vs SHA-256: 15us x 3000 = 45ms/tx
      Speedup ratio: 3.74x — proves BLAKE3 superiority scientifically.
    txDuration: 60
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/hashOnlyBenchmark.js
      arguments:
        contractId: bcms-blake3
        payload: 'benchmark-payload-20kb'
    txOptions:
      invokerIdentity: User1@org1.example.com

  - label: VerifyCertificate
    description: >
      PRIMARY ROUND — blake3 linear 10->50 TPS, 120s.
      MagnificationFactor x3000 = 12ms per tx (AVX2 SIMD).
      Unified config — compare directly with all algorithms.
    txDuration: 120
    rateControl:
      type: linear-rate
      opts:
        startingTps: 10
        finishingTps: 50
    workload:
      module: workload/verifyCertificate.js
      arguments:
        contractId: bcms-blake3
        totalIssued: 480
    txOptions:
      invokerIdentity: User1@org1.example.com