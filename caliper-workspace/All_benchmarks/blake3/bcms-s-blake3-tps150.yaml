test:
  name: bcms-s-blake3-tps150
  description: 'BLAKE3 at 150 TPS. MagnificationFactor x3000 = 12ms per tx.'
  workers:
    type: local
    number: 4
  rounds:
    - label: IssueCertificate
      description: 'Issue certs at 22 TPS, 60s'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 22
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: HashOnlyBenchmark
      description: 'PURE CPU — BLAKE3: 4us x 3000 = 12ms/tx'
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-blake3
          payload: 'benchmark-payload-20kb'
      txOptions:
        invokerIdentity: User1@org1.example.com
    - label: VerifyCertificate
      description: 'PRIMARY ROUND — blake3 linear 30->150 TPS, 120s'
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 30
          finishingTps: 150
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 1320
      txOptions:
        invokerIdentity: User1@org1.example.com
