test:
  name: bcms-s2-blake3-tps200
  description: >
    Scenario S2 BLAKE3 Alternative at 200 TPS target. VerifyCertificate: linear
    40->200 TPS (PRIMARY COMPARISON ROUND). MagnificationFactor x3000 = 12ms per
    tx (3.74x faster than SHA-256 45ms). Expected: BLAKE3 stable at 200 TPS while
    SHA-256 saturates.
  workers:
    type: local
    number: 15
  rounds:
    - label: IssueCertificate
      description: 'Issue certs at 30 TPS, 60s (parity with SHA-256 config)'
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — BLAKE3 linear 40->200 TPS, 120s. MagnificationFactor x3000
        = 12ms per tx (AVX2 SIMD). Expected: BLAKE3 remains extremely fast and
        stable. Compare directly with SHA-256 which uses same 40->200 TPS range.
      txDuration: 30
      rateControl:
        type: linear-rate
        opts:
          startingTps: 40
          finishingTps: 200
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 1800
      txOptions:
        invokerIdentity: User1@org1.example.com
