# ============================================================================
#  BCMS — Caliper Network Configuration Template
#  Caliper 0.6.0 — Fabric 2.5 Adapter
#
#  This is the TEMPLATE. setup_and_run_all.sh substitutes {{PLACEHOLDERS}}
#  at runtime. The actual generated file is networks/networkConfig.yaml
#
#  KEY FIXES vs original broken config:
#    1. caliper.blockchain attribute added (was missing → caused error)
#    2. Array-based organizations format (Caliper 0.6.0 format)
#    3. identities.certificates[] instead of adminPrivateKey/signedCert
#    4. connectionProfile.discover: false (avoid DiscoveryService errors)
# ============================================================================

name: bcms-test-network
version: "2.0.0"

# ── REQUIRED: Tells Caliper which SUT adapter to load ────────────────────────
caliper:
  blockchain: fabric

channels:
  - channelName: mychannel
    contracts:
      - id: basic

organizations:
  - mspid: Org1MSP
    identities:
      certificates:
        - name: 'User1@org1.example.com'
          clientPrivateKey:
            # IMPORTANT: This path is dynamically resolved at runtime by setup_and_run_all.sh.
            # The private key filename contains a random hash and changes every time
            # the network is recreated. Use `find ... -type f` to locate it.
            path: '{{ORG1_USER1_PRIVATE_KEY}}'
          clientSignedCert:
            # Certificate path — resolved at runtime
            path: '{{ORG1_USER1_SIGNED_CERT}}'
    connectionProfile:
      path: 'networks/connection-org1.yaml'
      # CRITICAL: Must be false when using manual connection profiles
      # Setting to true causes DiscoveryService errors in containerized environments
      discover: false

  - mspid: Org2MSP
    identities:
      certificates:
        - name: 'User1@org2.example.com'
          clientPrivateKey:
            path: '{{ORG2_USER1_PRIVATE_KEY}}'
          clientSignedCert:
            path: '{{ORG2_USER1_SIGNED_CERT}}'
    connectionProfile:
      path: 'networks/connection-org2.yaml'
      discover: false
