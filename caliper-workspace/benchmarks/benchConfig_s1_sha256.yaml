# ============================================================================
#  BCMS — Scenario S1: SHA-256 Baseline  (v8.0 — FIXED FAIR COMPARISON)
#  Hash algorithm : SHA-256 (crypto/sha256 — sequential, no SIMD)
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 10 (local)
#  Transcript     : 50 KB per certificate (research stress payload)
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters in S1 and S2 YAML are IDENTICAL except contractId.
#  contractId: bcms-sha256  (S1)  vs  contractId: bcms-blake3  (S2)
#  This ensures any TPS/latency difference = hash algorithm ONLY.
#
#  FIX-CONTRACTID (v8.0):
#  contractId is now explicitly specified in every round's arguments.
#  Previously missing → workloads defaulted to 'bcms-sha256' accidentally.
#
#  FIX-DESCRIPTION (v8.0):
#  IssueCertificate corrected to fixed-rate 50 TPS (not linear-rate).
#  RevokeCertificate description corrected — no re-hash in v12 chaincode.
#
#  Benchmark Design:
#    Round 1 IssueCertificate : fixed-rate 50 TPS, 60 s — issues 3,000 certs
#    Round 2 VerifyCertificate: linear-rate 100→500 TPS, 60 s (CPU-bound)
#    Round 3 QueryAllCerts    : fixed-rate 50 TPS, 60 s (CouchDB I/O-bound)
#    Round 4 RevokeCertificate: fixed-rate 50 TPS, 60 s (flag-only write)
#
#  Performance expectation (SHA-256 = T₁ baseline):
#    SHA-256 hash: 15.0 µs × 100 magnification = 1,500 µs per tx
#    S2 (BLAKE3) will demonstrate T₂ < T₁ in VerifyCertificate and IssueCertificate
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-baseline-v8
  description: >
    Scenario S1 — SHA-256 Baseline (v8.0 Fixed Fair Comparison).
    Hash: SHA-256 (crypto/sha256, sequential Merkle-Damgard, 15.0 us/hash).
    Magnification: x100 iterations per tx → 1,500 us hash overhead per tx.
    Payload: 50 KB transcript per certificate.
    batchSize: 1 (single certificate per Fabric transaction).
    All rounds: fixed-rate 50 TPS (Issue/Query/Revoke), linear 100-500 (Verify).
    contractId: bcms-sha256 (explicitly set in all rounds).
    IDENTICAL structure to S2-BLAKE3 for fair comparison.
  workers:
    type: local
    number: 10

  rounds:

    - label: IssueCertificate
      description: >
        S1 SHA-256 — Issue 3,000 certificates at fixed-rate 50 TPS, 60 s.
        50 KB transcript: SHA-256 processes ~51,000 bytes × 100 iterations.
        Hash overhead: 15.0 us × 100 = 1,500 us per transaction.
        contractId: bcms-sha256 (FIX-CONTRACTID v8.0).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 50000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S1 SHA-256 — Linear-rate 100-500 TPS verify (read-only, CPU-bound).
        VerifyCertificateByID re-computes SHA-256 on-chain: 1,500 us overhead per tx.
        This is the primary function where SHA-256 vs BLAKE3 latency difference is visible.
        contractId: bcms-sha256 (FIX-CONTRACTID v8.0).
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 500
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 3000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S1 SHA-256 — Fixed-rate 50 TPS CouchDB rich query (I/O-bound).
        Hash algorithm has zero impact on this operation — any latency difference
        between S1 and S2 in this round is CouchDB/network variance only.
        contractId: bcms-sha256 (FIX-CONTRACTID v8.0).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-sha256
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S1 SHA-256 — Fixed-rate 50 TPS revocation (idempotent write).
        v12 chaincode: flag-only update, no hash recomputation (FIX-REVOKE).
        SHA-256 and BLAKE3 perform identical work in this round.
        Any latency difference = Fabric/CouchDB overhead, not algorithm.
        contractId: bcms-sha256 (FIX-CONTRACTID v8.0).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 3000
      txOptions:
        invokerIdentity: User1@org1.example.com