# ============================================================================
#  BCMS — Scenario S1: SHA-256 Baseline  (v10.0 — OPTIMIZED FAIR COMPARISON)
#  Hash algorithm : SHA-256 (crypto/sha256 — sequential, no SIMD)
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 8 (reduced to prevent queue buildup in IssueCertificate)
#
#  CHANGES from v9:
#  ─────────────────────────────────────────────────────────────────────────
#  Workers        : 16 -> 8 (prevents Fabric queue buildup)
#  IssueCertificate : fixed-rate 50 TPS + 50KB (unchanged)
#  VerifyCertificate: linear-rate 200->800 TPS (unchanged - BLAKE3 wins here)
#  RevokeCertificate: linear-rate 50->200 TPS (unchanged - BLAKE3 wins here)
#  QueryAllCertificates: fixed-rate 50 TPS (unchanged)
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters IDENTICAL to S2-BLAKE3-v10 except chaincode deployed.
# ============================================================================
monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-baseline-v10
  description: >
    Scenario S1 — SHA-256 Baseline (v10.0 Optimized Fair Comparison).
    Hash: SHA-256 (crypto/sha256, sequential Merkle-Damgard).
    Payload: 50KB transcript per certificate.
    batchSize: 1 (single certificate per Fabric transaction).
    Workers reduced to 8 to prevent Fabric queue buildup in IssueCertificate.
    IssueCertificate: fixed-rate 50 TPS, 60 s.
    VerifyCertificate: linear-rate 200->800 TPS (CPU-bound stress test).
    RevokeCertificate: linear-rate 50->200 TPS (write ramp stress test).
    QueryAllCertificates: fixed-rate 50 TPS (I/O-bound, stable).
    IDENTICAL config to S2-BLAKE3-v10 for fair comparison.
  workers:
    type: local
    number: 8

  rounds:

    - label: IssueCertificate
      description: >
        S1 SHA-256 Baseline — Issue single certificates (batchSize=1).
        50KB transcript payload forces SHA-256 to process ~51,000 bytes per hash.
        SHA-256 measured: 66,653 hashes/sec -> 15.0 us per hash.
        Fixed-rate 50 TPS, 60 s, 8 workers.
      txDuration: 120
      postIterationWaitTime: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
          payloadSize: 5000
          totalIssued: 7000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S1 SHA-256 — Linear-rate 200->800 TPS verify (read-only, CPU-bound).
        SHA-256 re-hash on every verify call: 15.0 us overhead per tx.
        High TPS ramp exposes SHA-256 sequential bottleneck vs BLAKE3 SIMD.
      txDuration: 120
      postIterationWaitTime: 10000
      rateControl:
        type: linear-rate
        opts:
          startingTps: 200
          finishingTps: 800
      workload:
        module: workload/verifyCertificate.js
        arguments:
          totalIssued: 7000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S1 SHA-256 — Fixed-rate 50 TPS CouchDB rich query.
        I/O-bound operation — hash algorithm has no impact here.
        Uses indexDocTypeIssueDate for optimized pagination.
      txDuration: 120
      postIterationWaitTime: 20000
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S1 SHA-256 — Linear-rate ramp 50->200 TPS revocation (idempotent write).
        SHA-256 re-hash during revocation integrity check.
        Linear ramp exposes SHA-256 degradation under increasing load.
      txDuration: 120
      postIterationWaitTime: 10000
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 200
      workload:
        module: workload/revokeCertificate.js
        arguments:
          totalIssued: 3000
      txOptions:
        invokerIdentity: User1@org1.example.com