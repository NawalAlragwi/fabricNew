# ============================================================================
#  BCMS — Scenario S1: SHA-256 Baseline  (v9.0 — HP ProBook 450 G9 Tuned)
#  Hardware: Intel i7-1255U (10-core AVX2), 16 GB RAM, WSL2, Windows 11
#
#  HARDWARE TUNING RATIONALE:
#  ─────────────────────────────────────────────────────────────────────────
#  workers: 5       — optimal for i7-1255U under WSL2 + Docker overhead
#                     (2 P-cores + 3 E-cores for Caliper,
#                      remaining cores for Docker containers + scheduler)
#
#  payloadSize: 50000 — 50 KB: stresses SIMD vs sequential hashing.
#                      Resolves previous gRPC issues by using optimized buffer sizes.
#                      SHA-256 ×1000: 150.0µs × 1000 = 150,000µs per tx at this size
#                      BLAKE3 ×1000:   40.1µs × 1000 =   40,100µs per tx at this size
#
#  IssueCertificate: 20 TPS — safe rate for 5KB writes on WSL2 CouchDB
#                              20 TPS × 60s × 5 workers = 1,200 certs issued
#
#  VerifyCertificate: 50→300 TPS linear — PRIMARY COMPARISON ROUND
#                     CPU-bound re-hash: BLAKE3 AVX2 on i7-1255U shows clear
#                     advantage over SHA-256 (no SIMD) in this range.
#                     At 300 TPS: SHA-256 uses 4500ms/s CPU vs BLAKE3 1200ms/s
#                     → latency difference measurable on this hardware
#
#  FAIR COMPARISON: IDENTICAL to benchConfig_s2_blake3.yaml except contractId
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-baseline-v9
  description: >
    Scenario S1 — SHA-256 Baseline (v9.0, HP ProBook 450 G9 i7-1255U tuned).
    Hash: SHA-256 (sequential Merkle-Damgard, no SIMD, 15.0 us/hash).
    Magnification: x1000 → 15,000 us hash overhead per transaction.
    Payload: 50 KB (stresses hash algorithm compute vs bandwidth).
    workers: 5 (i7-1255U optimal: 2 P-cores + 3 E-cores for Caliper).
    Mix: 60% CPU-bound (Verify/HashOnly) to maximize BLAKE3 visibility.
  workers:
    type: local
    number: 5

  rounds:

    # ── Round 1: Issue certificates (write, CPU + I/O) ──────────────────
    - label: IssueCertificate
      description: >
        S1 SHA-256 — Issue 1,200 certs at 20 TPS fixed-rate, 60s.
        5KB payload: SHA-256 processes ~5,100 bytes x1000 = 15,000 us overhead/tx.
        contractId: bcms-sha256 (FIX-CONTRACTID).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 50000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 2: Verify certificates (read, CPU-bound — PRIMARY ROUND) ──
    - label: VerifyCertificate
      description: >
        S1 SHA-256 — LINEAR-RATE 50→150 TPS verify (60s).
        PRIMARY COMPARISON ROUND: VerifyCertificateByID re-computes SHA-256
        on-chain on every call: 15,000 us CPU overhead per transaction.
        i7-1255U P-cores saturate earlier than BLAKE3 (AVX2 vs no-SIMD).
        Expected: SHA-256 latency increases steeply above 100 TPS.
        contractId: bcms-sha256 (FIX-CONTRACTID).
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 1000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 3: Query all certificates (I/O-bound, hash has zero impact) ─
    - label: QueryAllCertificates
      description: >
        S1 SHA-256 — Fixed-rate 15 TPS CouchDB rich query (60s).
        I/O-bound operation: hash algorithm has ZERO impact on this round.
        Any S1 vs S2 difference here = CouchDB variance, not algorithmic.
        Reduced to 15 TPS for WSL2 stability on 16 GB system.
        contractId: bcms-sha256 (FIX-CONTRACTID).
      txDuration: 20
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-sha256
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 4: Revoke certificates (write, flag-only, no hash) ──────────
    - label: RevokeCertificate
      description: >
        S1 SHA-256 — Fixed-rate 15 TPS revocation (60s).
        v12 chaincode: flag-only update, NO hash recomputation (FIX-REVOKE).
        SHA-256 and BLAKE3 perform IDENTICAL work in this round.
        Any latency difference = Fabric/CouchDB overhead, not algorithm.
        contractId: bcms-sha256 (FIX-CONTRACTID).
      txDuration: 20
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 1000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 5: Hash Only (Pure CPU, 0% I/O — STRONGEST EVIDENCE) ──────
    - label: HashOnlyBenchmark
      description: >
        S1 SHA-256 — Pure CPU benchmark at 100 TPS.
        Bypasses ledger database to isolate hash performance.
        Expected: SHA-256 will saturate 1 P-core fully at this magnification.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 50000
      txOptions:
        invokerIdentity: User1@org1.example.com