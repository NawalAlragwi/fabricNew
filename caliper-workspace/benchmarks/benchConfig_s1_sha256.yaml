# ============================================================================
#  BCMS — Scenario S1: SHA-256 Baseline  (v12.0 — FIXED ISOLATED CHAINCODE)
#  Hash algorithm : SHA-256 (crypto/sha256 — sequential, no SIMD)
#  Chaincode ID   : bcms-sha256  ← مستقل عن S2 تماماً
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 8
#
#  FIXES v12:
#  ─────────────────────────────────────────────────────────────────────────
#  FIX-#2: contractId: bcms-sha256 في كل round (بدل 'basic' المشترك)
#  FIX-#3: IssueCertificate fixed-rate 80 TPS (Stabilized)
#           VerifyCertificate: linear 50→600 TPS
#           RevokeCertificate: linear 20→100 TPS
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters IDENTICAL to S2-BLAKE3-v12 except chaincode ID.
# ============================================================================
monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-baseline-v12
  description: >
    Scenario S1 — SHA-256 Baseline (v12.0 Isolated Chaincode + High TPS).
    Hash: SHA-256 (crypto/sha256, sequential Merkle-Damgard).
    Chaincode: bcms-sha256 (deployed independently from S2).
    Payload: 100KB transcript per certificate.
    batchSize: 1 (single certificate per Fabric transaction).
    IssueCertificate: fixed-rate 80 TPS, 60s.
    VerifyCertificate: linear-rate 50→600 TPS.
    RevokeCertificate: linear-rate 20→100 TPS.
    QueryAllCertificates: fixed-rate 20 TPS.
    IDENTICAL config to S2-BLAKE3-v12 for fair comparison.
  workers:
    type: local
    number: 4

  rounds:

    - label: IssueCertificate
      description: >
        S1 SHA-256 — Issue single certificates (batchSize=1).
        100KB transcript forces SHA-256 to process ~102,400 bytes per hash × 100 iterations.
      txDuration: 60
      postIterationWaitTime: 20000
      rateControl:
        type: fixed-rate
        opts:
          tps: 80
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-s1
          batchSize: 1
          payloadSize: 100000
          totalIssued: 25000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S1 SHA-256 — Linear-rate 500→1500 TPS verify (CPU-bound stress test).
        SHA-256 re-hash × 100 iterations per verify: 100 × 15µs = 1500µs CPU/tx.
        At 1500 TPS: 1500 × 1500µs = 2,250,000µs/s CPU demand on peer → saturation.
        This is the KEY round where SHA-256 sequential bottleneck becomes visible.
      txDuration: 60
      postIterationWaitTime: 20000
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 600
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-s1
          totalIssued: 25000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S1 SHA-256 — Fixed-rate 20 TPS CouchDB rich query.
        I/O-bound operation — hash algorithm has no impact here.
        Uses indexDocTypeIssueDate for optimized pagination.
      txDuration: 120
      postIterationWaitTime: 20000
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-s1
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S1 SHA-256 — Linear-rate ramp 100→500 TPS revocation (idempotent write).
        SHA-256 sequential hash computation during revocation integrity check.
        Linear ramp exposes SHA-256 degradation under increasing load.
      txDuration: 60
      postIterationWaitTime: 20000
      rateControl:
        type: linear-rate
        opts:
          startingTps: 20
          finishingTps: 100
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-s1
          totalIssued: 10000
      txOptions:
        invokerIdentity: User1@org1.example.com