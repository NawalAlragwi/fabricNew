# ============================================================================
#  BCMS — Scenario S1: SHA-256 Baseline (v9.0 — PERFORMANCE FIXES)
#  Hash algorithm : SHA-256 (crypto/sha256 — sequential, no SIMD)
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 10
#  Transcript     : 5 KB per certificate (Reduced from 50 KB for stability)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-baseline-v9
  description: >
    Scenario S1 — SHA-256 Baseline.
    Payload: 5 KB transcript per certificate.
    Issue: 20 TPS (Stabilized).
    Verify: 100-500 TPS linear ramp.
    Query/Revoke: 50 TPS.
  workers:
    type: local
    number: 10

  rounds:
    - label: IssueCertificate
      description: >
        S1 SHA-256 — Issue certificates at fixed-rate 20 TPS.
        Payload: 5 KB transcript.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S1 SHA-256 — Linear-rate 100-500 TPS verify (read-only).
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 500
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 1000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S1 SHA-256 — Fixed-rate 50 TPS CouchDB rich query.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-sha256
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S1 SHA-256 — Fixed-rate 50 TPS revocation.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 1000
      txOptions:
        invokerIdentity: User1@org1.example.com