# ============================================================================
#  BCMS Benchmark — Scenario 1: SHA-256 Baseline
#  Single certificate per transaction, no batching.
#  Chaincode: chaincode-bcms/sha256
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - peer0.org2.example.com

test:
  name: bcms-s1-sha256-baseline
  description: >
    SHA-256 baseline benchmark. Single-certificate issuance, no batching.
    Measures raw throughput of standard SHA-256 hashing in Hyperledger Fabric.
  workers:
    type: local
    number: 4

  rounds:

    - label: IssueCertificate
      description: Issue single certificates using SHA-256 hashing.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: Verify certificate existence (SHA-256 mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: Full ledger scan in SHA-256 mode.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: Revoke certificates using SHA-256 chaincode.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    - label: GetCertificatesByStudent
      description: Per-student certificate query (SHA-256 mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: GetAuditLogs
      description: Audit trail range scan (SHA-256 mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
