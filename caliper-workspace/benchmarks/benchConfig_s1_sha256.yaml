# ============================================================================
#  BCMS — Scenario S1: SHA-256 Baseline  (v7.0 — FAIR COMPARISON)
#  Hash algorithm : SHA-256 (crypto/sha256 — sequential, no SIMD)
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 10 (local)
#  Transcript     : 5KB per certificate (realistic payload stress test)
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters in benchConfig_s1_sha256.yaml and benchConfig_s2_blake3.yaml
#  are IDENTICAL except for the chaincode deployed (sha256 vs blake3).
#  This ensures any TPS/latency difference is due ONLY to the hash algorithm.
#
#  Benchmark Design:
#    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 10 workers
#    VerifyCertificate: fixed-rate 200 TPS, 60 s (read-only, no ordering)
#    QueryAllCertificates: fixed-rate 100 TPS, 60 s (CouchDB rich query)
#    RevokeCertificate: fixed-rate 200 TPS, 60 s (write, idempotent)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s1-sha256-baseline-v7
  description: >
    Scenario S1 — SHA-256 Baseline (v7.0 Fair Comparison).
    Hash: SHA-256 (crypto/sha256, sequential Merkle–Damgård).
    Payload: 5KB transcript per certificate (realistic stress test).
    batchSize: 1 (single certificate per Fabric transaction).
    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 10 workers.
    All read rounds: fixed-rate 200 TPS, 60 s.
    IDENTICAL config to S2-BLAKE3 for fair comparison.
  workers:
    type: local
    number: 10

  rounds:

    - label: IssueCertificate
      description: >
        S1 SHA-256 Baseline — Issue single certificates (batchSize=1).
        5KB transcript payload forces SHA-256 to process ~5100 bytes per hash.
        SHA-256 measured: 66,653 hashes/sec → 15.0 µs per hash.
        Linear ramp 50→300 TPS, 60 s, 10 workers.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S1 SHA-256 — Fixed-rate 200 TPS verify (read-only, no ordering).
        SHA-256 re-hash on every verify call: 15.0 µs overhead per tx.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S1 SHA-256 — Fixed-rate 100 TPS CouchDB rich query.
        Uses indexDocTypeIssueDate for optimized pagination.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S1 SHA-256 — Fixed-rate 200 TPS revocation (idempotent write).
        SHA-256 re-hash during revocation integrity check.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com
