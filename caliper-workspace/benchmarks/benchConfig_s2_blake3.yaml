# ============================================================================
#  BCMS — Scenario S2: BLAKE3 Alternative  (v8.0 — OPTIMIZED COMPARISON)
#  Hash algorithm : BLAKE3 (lukechampine.com/blake3, tree-based, SIMD-accelerated)
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 16 (increased for parallelism stress test)
#  Transcript     : 100KB per certificate (high CPU stress test)
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters in benchConfig_s1_sha256.yaml and benchConfig_s2_blake3.yaml
#  are IDENTICAL except for the chaincode deployed (sha256 vs blake3).
#  This ensures any TPS/latency difference is due ONLY to the hash algorithm.
#
#  Benchmark Design:
#    IssueCertificate   : linear-rate ramp 50→300 TPS, 60 s, 16 workers
#    VerifyCertificate  : linear-rate ramp 200→800 TPS, 60 s (CPU-bound stress)
#    QueryAllCertificates: fixed-rate 50 TPS, 60 s (CouchDB — I/O-bound, stable)
#    RevokeCertificate  : linear-rate ramp 50→200 TPS, 60 s (write, idempotent)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s2-blake3-alternative-v8
  description: >
    Scenario S2 — BLAKE3 Alternative (v8.0 Optimized Comparison).
    Hash: BLAKE3 (lukechampine.com/blake3, tree-based, SIMD-accelerated).
    Payload: 100KB transcript per certificate (High CPU Stress Test).
    batchSize: 1 (single certificate per Fabric transaction).
    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 16 workers.
    VerifyCertificate: linear-rate ramp 200→800 TPS, 60 s (CPU-bound).
    RevokeCertificate: linear-rate ramp 50→200 TPS, 60 s.
    QueryAllCertificates: fixed-rate 50 TPS, 60 s (I/O-bound, stable).
    IDENTICAL config to S1-SHA256 for fair comparison.
  workers:
    type: local
    number: 16

  rounds:

    - label: IssueCertificate
      description: >
        S2 BLAKE3 Alternative — Issue single certificates (batchSize=1).
        100KB transcript payload: BLAKE3 processes ~102,000 bytes with AVX2/NEON.
        BLAKE3 measured: 249,464 hashes/sec → 4.01 µs per hash.
        Linear-rate ramp 50→300 TPS, 60 s, 16 workers.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
          payloadSize: 100000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S2 BLAKE3 — Linear-rate 200→800 TPS verify (read-only, CPU-bound).
        BLAKE3 re-hash on every verify call: 4.01 µs overhead per tx.
        SIMD acceleration (AVX2/NEON) gives BLAKE3 clear advantage at high TPS.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 200
          finishingTps: 800
      workload:
        module: workload/verifyCertificate.js
        arguments:
          totalIssued: 3000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S2 BLAKE3 — Fixed-rate 50 TPS CouchDB rich query.
        Kept at 50 TPS — this round is I/O-bound not CPU-bound.
        Uses indexDocTypeIssueDate for optimized pagination.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S2 BLAKE3 — Linear-rate ramp 50→200 TPS revocation (idempotent write).
        BLAKE3 re-hash during revocation integrity check.
        BLAKE3 tree-based parallelism maintains lower latency under ramp load.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 200
      workload:
        module: workload/revokeCertificate.js
        arguments:
          totalIssued: 3000
      txOptions:
        invokerIdentity: User1@org1.example.com