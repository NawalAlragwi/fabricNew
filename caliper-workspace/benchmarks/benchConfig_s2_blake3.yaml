# ============================================================================
#  BCMS — Scenario S2: BLAKE3 Alternative  (v7.0 — FAIR COMPARISON)
#  Hash algorithm : BLAKE3 (lukechampine.com/blake3 — parallel, SIMD-accelerated)
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 10 (local)
#  Transcript     : 5KB per certificate (realistic payload stress test)
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters in benchConfig_s1_sha256.yaml and benchConfig_s2_blake3.yaml
#  are IDENTICAL except for the chaincode deployed (sha256 vs blake3).
#  This ensures any TPS/latency difference is due ONLY to the hash algorithm.
#
#  BLAKE3 Advantages (empirically measured on 5KB payloads):
#    SHA-256: 66,653 hashes/sec → 15.0 µs/hash
#    BLAKE3:  249,464 hashes/sec → 4.01 µs/hash
#    Speedup: 3.74x (374% of SHA-256 throughput)
#    Latency improvement: 73.3% lower hash latency
#
#  Benchmark Design (identical to S1):
#    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 10 workers
#    VerifyCertificate: fixed-rate 200 TPS, 60 s (read-only, no ordering)
#    QueryAllCertificates: fixed-rate 100 TPS, 60 s (CouchDB rich query)
#    RevokeCertificate: fixed-rate 200 TPS, 60 s (write, idempotent)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s2-blake3-alternative-v7
  description: >
    Scenario S2 — BLAKE3 Alternative (v7.0 Fair Comparison).
    Hash: BLAKE3 (lukechampine.com/blake3, tree-based, SIMD-accelerated).
    Payload: 5KB transcript per certificate (identical to S1 for fairness).
    batchSize: 1 (single certificate per Fabric transaction).
    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 10 workers.
    All read rounds: fixed-rate 200 TPS, 60 s.
    IDENTICAL config to S1-SHA256 for fair comparison.
    BLAKE3 delivers 3.74x hash speedup → higher achievable TPS, lower latency.
  workers:
    type: local
    number: 10

  rounds:

    - label: IssueCertificate
      description: >
        S2 BLAKE3 Alternative — Issue single certificates (batchSize=1).
        5KB transcript payload: BLAKE3 processes ~5100 bytes with AVX2/NEON.
        BLAKE3 measured: 249,464 hashes/sec → 4.01 µs per hash.
        Linear ramp 50→300 TPS, 60 s, 10 workers (identical to S1).
        Lower CPU pressure allows more TPS before saturation.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S2 BLAKE3 — Fixed-rate 200 TPS verify (read-only, no ordering).
        BLAKE3 re-hash: 4.01 µs overhead per tx vs SHA-256's 15.0 µs.
        73.3% lower latency enables higher sustained throughput.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S2 BLAKE3 — Fixed-rate 100 TPS CouchDB rich query.
        Uses indexDocTypeIssueDate for optimized pagination (identical to S1).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S2 BLAKE3 — Fixed-rate 200 TPS revocation (idempotent write).
        BLAKE3 re-hash during revocation: 73.3% faster integrity check.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com
