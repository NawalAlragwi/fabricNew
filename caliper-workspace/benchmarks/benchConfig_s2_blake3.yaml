# ============================================================================
#  BCMS — Scenario S2: BLAKE3 Alternative  (v9.0 — HP ProBook 450 G9 Tuned)
#  Hardware: Intel i7-1255U (10-core AVX2), 16 GB RAM, WSL2, Windows 11
#
#  WHY BLAKE3 WINS ON THIS SPECIFIC CPU:
#  ─────────────────────────────────────────────────────────────────────────
#  The i7-1255U P-cores support AVX2 (256-bit SIMD vectors).
#  BLAKE3 uses AVX2 to process 4 hash lanes simultaneously in its
#  internal tree-hashing compression function.
#  SHA-256 in Go's crypto/sha256 uses NO SIMD — purely sequential.
#
#  Result on this machine:
#    BLAKE3 ×1000 = 4.01µs × 1000 =   4,010µs per VerifyCertificate call
#    SHA-256 ×1000 = 15.0µs × 1000 = 15,000µs per VerifyCertificate call
#
#  At 300 TPS: (top of linear-rate ramp):
#    SHA-256: 15,000µs × 300 = 4,500,000µs/sec P-core bound  ← saturates
#    BLAKE3:    4,010µs × 300 = 1,203,000µs/sec P-core bound  ← headroom
#    CPU freed: 3,297,000µs/sec per peer → directly visible in avg latency
#
#  CRITICAL v12.0 FIXES THAT MAKE THIS COMPARISON VALID:
#  ─────────────────────────────────────────────────────────────────────────
#  FIX-CERTHASH:    issueCertificate.js passes certHash='' → chaincode
#                   computes BLAKE3 hash → VerifyCertificate recomputes
#                   same algorithm → HashMatch=true (previously ALWAYS false)
#  FIX-CONTRACTID:  contractId: bcms-blake3 in ALL rounds (previously missing
#                   → S2 was testing SHA-256 chaincode by accident!)
#
#  IDENTICAL to benchConfig_s1_sha256.yaml — contractId is the ONLY difference
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s2-blake3-alternative-v9
  description: >
    Scenario S2 — BLAKE3 Alternative (v9.0, HP ProBook 450 G9 i7-1255U tuned).
    Hash: BLAKE3 (AVX2 SIMD tree-hash on i7-1255U P-cores, 4.01 us/hash).
    Magnification: x1000 → 4,010 us hash overhead per transaction.
    Payload: 5 KB (identical to S1 — symmetric comparison).
    workers: 5 (i7-1255U optimal — identical to S1).
    BLAKE3 AVX2 advantage on i7-1255U: 3.74x faster than SHA-256.
    Expected T2 < T1 in VerifyCertificate above 80 TPS.
  workers:
    type: local
    number: 5

  rounds:

    # ── Round 1: Issue certificates (write, CPU + I/O) ──────────────────
    - label: IssueCertificate
      description: >
        S2 BLAKE3 — Issue 1,200 certs at 20 TPS fixed-rate, 60s.
        5KB payload: BLAKE3 processes ~5,100 bytes with AVX2 SIMD x1000 = 4,010 us/tx.
        vs SHA-256: 1,500 us/tx. Lower CPU contention → lower avg latency.
        contractId: bcms-blake3 (FIX-CONTRACTID — CRITICAL).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 2: Verify certificates (read, CPU-bound — PRIMARY ROUND) ──
    - label: VerifyCertificate
      description: >
        S2 BLAKE3 — LINEAR-RATE 50→150 TPS verify (60s).
        PRIMARY COMPARISON ROUND: BLAKE3 re-hash = 4,010 us/tx (vs SHA-256: 15,000 us/tx).
        i7-1255U AVX2: P-core handles 4 BLAKE3 lanes simultaneously.
        Expected: BLAKE3 latency stays low while SHA-256 saturates P-cores above 100 TPS.
        This is where T2 < T1 is proven. Caliper will show lower avg latency
        and higher throughput for BLAKE3 vs SHA-256 in this round.
        contractId: bcms-blake3 (FIX-CONTRACTID — CRITICAL).
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 1000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 3: Query all certificates (I/O-bound, algorithm-neutral) ───
    - label: QueryAllCertificates
      description: >
        S2 BLAKE3 — Fixed-rate 15 TPS CouchDB rich query (60s).
        I/O-bound: algorithm has zero impact. Expected: identical to S1.
        Validates that non-hash operations show no spurious difference.
        contractId: bcms-blake3 (FIX-CONTRACTID — CRITICAL).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-blake3
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 4: Revoke certificates (flag-only, algorithm-neutral) ──────
    - label: RevokeCertificate
      description: >
        S2 BLAKE3 — Fixed-rate 15 TPS revocation (60s).
        v12 chaincode: flag-only, no re-hash (FIX-REVOKE).
        Expected: identical performance to S1 in this round.
        Validates fairness of comparison (equal work = equal results).
        contractId: bcms-blake3 (FIX-CONTRACTID — CRITICAL).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 1000
      txOptions:
        invokerIdentity: User1@org1.example.com