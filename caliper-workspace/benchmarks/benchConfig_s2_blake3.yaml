# ============================================================================
#  BCMS — Scenario S2: BLAKE3 Alternative  (v6.0)
#  Hash algorithm : BLAKE3 only
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 3 (local)
#  IssueCertificate: linear-rate 10 → 50 TPS over 60 s
#  Read rounds    : fixed-rate (15-30 TPS), 60 s
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s2-blake3-alternative-v6
  description: >
    Scenario S2 — BLAKE3 Alternative (v6.0).
    batchSize: 1 (single certificate per Fabric transaction).
    IssueCertificate: linear-rate ramp 10→50 TPS, 60 s, 3 workers.
    All read rounds: fixed-rate matching S1, 60 s.
    Requires chaincode deployed with HASH_MODE=blake3.
  workers:
    type: local
    number: 3

  rounds:

    - label: IssueCertificate
      description: >
        S2 BLAKE3 Alternative — Issue single certificates (batchSize=1).
        Linear ramp 10→50 TPS over 60 s. Chaincode: BLAKE3 hash mode.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 10
          finishingTps: 50
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: Fixed-rate 30 TPS read-only verify.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: Fixed-rate 15 TPS full ledger scan.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: Fixed-rate 20 TPS revocation (idempotent).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: GetCertificatesByStudent
      description: Fixed-rate 15 TPS per-student query.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: GetAuditLogs
      description: Fixed-rate 15 TPS audit trail query.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com