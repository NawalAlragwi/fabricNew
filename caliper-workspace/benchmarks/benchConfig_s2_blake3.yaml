# ============================================================================
#  BCMS — Scenario S2: BLAKE3 Alternative  (v12.0 — FIXED ISOLATED CHAINCODE)
#  Hash algorithm : BLAKE3 (lukechampine.com/blake3, tree-based, SIMD-accelerated)
#  Chaincode ID   : bcms-blake3  ← مستقل عن S1 تماماً
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 8
#
#  FIXES v12:
#  ─────────────────────────────────────────────────────────────────────────
#  FIX-#2: contractId: bcms-blake3 في كل round (بدل 'basic' المشترك)
#  FIX-#3: IssueCertificate fixed-rate 80 TPS (Stabilized)
#           VerifyCertificate: linear 50→600 TPS
#           RevokeCertificate: linear 20→100 TPS
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  ALL parameters IDENTICAL to S1-SHA256-v12 except chaincode ID.
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s2-blake3-alternative-v12
  description: >
    Scenario S2 — BLAKE3 Alternative (v12.0 Isolated Chaincode + High TPS).
    Hash: BLAKE3 (lukechampine.com/blake3, tree-based, SIMD-accelerated).
    Chaincode: bcms-blake3 (deployed independently from S1).
    Payload: 100KB transcript per certificate.
    batchSize: 1 (single certificate per Fabric transaction).
    IssueCertificate: fixed-rate 80 TPS, 60s.
    VerifyCertificate: linear-rate 50→600 TPS.
    RevokeCertificate: linear-rate 20→100 TPS.
    QueryAllCertificates: fixed-rate 20 TPS.
    IDENTICAL config to S1-SHA256-v12 for fair comparison.
  workers:
    type: local
    number: 4

  rounds:

    - label: IssueCertificate
      description: >
        S2 BLAKE3 — Issue single certificates (batchSize=1).
        100KB transcript: BLAKE3 processes ~102,400 bytes with AVX2/NEON × 100 iterations.
      txDuration: 60
      postIterationWaitTime: 20000
      rateControl:
        type: fixed-rate
        opts:
          tps: 80
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-s2
          batchSize: 1
          payloadSize: 100000
          totalIssued: 25000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S2 BLAKE3 — Linear-rate 500→1500 TPS verify (CPU-bound stress test).
        BLAKE3 re-hash × 100 iterations per verify: 100 × 4µs = 400µs CPU/tx.
        At 1500 TPS: 1500 × 400µs = 600,000µs/s CPU demand → 3.75x less than SHA-256.
        SIMD acceleration (AVX2) gives BLAKE3 clear advantage — latency stays low.
      txDuration: 60
      postIterationWaitTime: 20000
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 600
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-s2
          totalIssued: 25000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S2 BLAKE3 — Fixed-rate 20 TPS CouchDB rich query.
        I/O-bound operation — hash algorithm has no impact here.
        Uses indexDocTypeIssueDate for optimized pagination.
      txDuration: 120
      postIterationWaitTime: 20000
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-s2
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S2 BLAKE3 — Linear-rate ramp 100→500 TPS revocation (idempotent write).
        BLAKE3 tree-based parallelism maintains lower latency under ramp load.
        Linear ramp exposes BLAKE3 advantage in CPU-bound write operations.
      txDuration: 60
      postIterationWaitTime: 20000
      rateControl:
        type: linear-rate
        opts:
          startingTps: 20
          finishingTps: 100
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-s2
          totalIssued: 10000
      txOptions:
        invokerIdentity: User1@org1.example.com