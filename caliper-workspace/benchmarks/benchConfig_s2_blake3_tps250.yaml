# ============================================================
#  S2 — BLAKE3 Alternative  |  Target TPS: 250
#  VerifyCertificate: 50 -> 250 TPS (PRIMARY ROUND)
#
#  PARITY with benchConfig_s1_sha256_tps250.yaml:
#  - workers: 4 (same as SHA-256)
#  - IssueCertificate: 38 TPS (same as SHA-256)
#  - VerifyCertificate: 50->250 TPS (same as SHA-256 - PRIMARY ROUND)
#
#  ONLY DIFFERENCE vs SHA-256: contractId = bcms-blake3
#  This guarantees any performance gap = algorithm difference only.
# ============================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1

test:
  name: bcms-s2-blake3-tps250
  description: >
    Scenario S2 BLAKE3 Alternative at 250 TPS target.
    VerifyCertificate: linear 50->250 TPS (PRIMARY COMPARISON ROUND).
    MagnificationFactor x3000 = 12ms per tx (3.74x faster than SHA-256 45ms).
    Expected: BLAKE3 stable at 250 TPS while SHA-256 saturates.
  workers:
    type: local
    number: 8

  rounds:

    # ── Round 1: Issue (identical to SHA-256 config) ──────────────────
    - label: IssueCertificate
      description: Issue certs at 38 TPS, 30s (parity with SHA-256 config)
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 38
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 2: PRIMARY COMPARISON ROUND (identical range to SHA-256) ──
    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — BLAKE3 linear 50->250 TPS, 30s.
        MagnificationFactor x3000 = 12ms per tx (AVX2 SIMD).
        Expected: BLAKE3 remains extremely fast and stable.
        Compare directly with SHA-256 which uses same 50->250 TPS range.
      txDuration: 30
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 250
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 2250
      txOptions:
        invokerIdentity: User1@org1.example.com


