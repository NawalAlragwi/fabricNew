# ============================================================
#  S1 — SHA-256 Baseline  |  Target TPS: 50
#  VerifyCertificate: 10 -> 50 TPS (PRIMARY ROUND)
#
#  PARITY with benchConfig_s2_blake3_tps50.yaml:
#  - workers: 2 (same as BLAKE3)
#  - IssueCertificate: 8 TPS (same as BLAKE3)
#  - QueryAllCertificates: 4 TPS (same as BLAKE3)
#  - RevokeCertificate: 4 TPS (same as BLAKE3)
#  - HashOnlyBenchmark: 25 TPS (same as BLAKE3)
#  - VerifyCertificate: 10->50 TPS (same as BLAKE3 - PRIMARY ROUND)
#
#  ONLY DIFFERENCE vs BLAKE3: contractId = bcms-sha256
#  This guarantees any performance gap = algorithm difference only.
# ============================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1

test:
  name: bcms-s1-sha256-tps50
  description: >
    Scenario S1 SHA-256 Baseline at 50 TPS target.
    VerifyCertificate: linear 10->50 TPS (PRIMARY COMPARISON ROUND).
    MagnificationFactor x3000 = 45ms per tx (3.74x slower than BLAKE3 12ms).
    Expected: SHA-256 saturates before 50 TPS while BLAKE3 stays stable.
  workers:
    type: local
    number: 2

  rounds:

    # ── Round 1: Issue (identical to BLAKE3 config) ──────────────────
    - label: IssueCertificate
      description: Issue certs at 8 TPS, 60s (parity with BLAKE3 config)
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 8
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 2: PRIMARY COMPARISON ROUND (identical range to BLAKE3) ──
    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — SHA-256 linear 10->50 TPS, 120s.
        MagnificationFactor x3000 = 45ms per tx (no SIMD).
        Expected: latency climbs steeply, peer saturates before 50 TPS.
        Compare directly with BLAKE3 which uses same 10->50 TPS range.
      txDuration: 120
      rateControl:
        type: linear-rate
        opts:
          startingTps: 10
          finishingTps: 50
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 480
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 3: Query (identical to BLAKE3 config) ──────────────────
    - label: QueryAllCertificates
      description: I/O-bound query 4 TPS, 60s (parity with BLAKE3 config)
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 4
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-sha256
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 4: Revoke (identical to BLAKE3 config) ─────────────────
    - label: RevokeCertificate
      description: Flag-only revoke 4 TPS, 60s (no hash recomputation)
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 4
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-sha256
          totalIssued: 480
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 5: HashOnly (identical TPS to BLAKE3 — key comparison) ─
    - label: HashOnlyBenchmark
      description: >
        Pure CPU hash isolation at 25 TPS, 60s (parity with BLAKE3 config).
        SHA-256 x3000 = 45ms/tx -> 25 TPS = 1125ms CPU/s -> saturates.
        BLAKE3 x3000 = 12ms/tx -> 25 TPS = 300ms CPU/s -> stable.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 25
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-sha256
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com
