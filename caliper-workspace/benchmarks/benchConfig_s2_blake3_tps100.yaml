# ============================================================
#  S2 — BLAKE3 Alternative  |  Target TPS: 100
#  VerifyCertificate: 20 → 100 TPS (PRIMARY ROUND)
#
#  FIXES vs previous version:
#  - IssueCertificate: 25 → 15 TPS (avoid overloading peer before Verify)
#  - QueryAllCertificates: 20 → 8 TPS (CouchDB recovery after heavy Verify)
#  - RevokeCertificate: 20 → 8 TPS (reduce post-Verify pressure)
#  - HashOnlyBenchmark: 80 → 50 TPS (within BLAKE3 safe zone x3000 mag)
#  - workers: 3 → 2 (reduce concurrency pressure on i7-1255U)
# ============================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1

test:
  name: bcms-s2-blake3-tps100
  description: >
    Scenario S2 BLAKE3 Alternative at 100 TPS target.
    VerifyCertificate: linear 20->100 TPS (PRIMARY COMPARISON ROUND).
    MagnificationFactor x3000 = 12ms per tx (3.74x faster than SHA-256 45ms).
    Expected: BLAKE3 stable at 100 TPS while SHA-256 saturates.
  workers:
    type: local
    number: 2

  rounds:

    # ── Round 1: Issue (reduced to avoid pre-loading the peer) ──────────
    - label: IssueCertificate
      description: Issue certs at 15 TPS, 60s (reduced from 25 to protect peer)
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 2: PRIMARY COMPARISON ROUND ───────────────────────────────
    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — BLAKE3 linear 20->100 TPS, 120s.
        MagnificationFactor x3000 = 12ms per tx.
        BLAKE3 should handle 100 TPS while SHA-256 saturates at ~80 TPS.
      txDuration: 30
      rateControl:
        type: linear-rate
        opts:
          startingTps: 20
          finishingTps: 100
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 900
      txOptions:
        invokerIdentity: User1@org1.example.com
