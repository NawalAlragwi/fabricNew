# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v5.0 (mirage branch)
#
#  Research Paper: "Enhancing Trust and Transparency in Education Using
#                   Blockchain: A Hyperledger Fabric-Based Framework"
#
#  Hash Algorithm: Hybrid SHA-256 XOR BLAKE3 (sha256-xor-blake3)
#
#  Chaincode: bcms-hybrid  (chaincode-bcms/hybrid-batch)
#  Channel:   mychannel
#
#  Rounds:
#    1. IssueCertificate           (Org1 RBAC Write)     @ 50  TPS / 30s
#    2. VerifyCertificate          (Public ReadOnly)      @ 100 TPS / 30s
#    3. QueryAllCertificates       (Public ReadOnly)      @  50 TPS / 30s
#    4. RevokeCertificate          (Org1/Org2 RBAC Write) @  50 TPS / 30s
#    5. GetCertificatesByStudent   (Public ReadOnly)      @  75 TPS / 30s
#    6. GetAuditLogs               (Public ReadOnly)      @  30 TPS / 30s
#
#  Zero-failure design:
#    - Write rounds: idempotent chaincode (duplicate = nil, not error)
#    - Read rounds:  readOnly=true bypasses orderer, returns empty not error
# ============================================================================

# ============================================================================
# RESOURCE MONITORS — Docker Container CPU & Memory Monitoring
# ============================================================================
monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - peer0.org2.example.com
          - couchdb0
          - couchdb1
          - ca_org1
          - ca_org2

test:
  name: bcms-hybrid-benchmark
  description: >
    BCMS Hybrid SHA-256 XOR BLAKE3 Benchmark — Research Paper Implementation.
    Tests all 6 chaincode functions with the hybrid hash algorithm.
    Target: 0% failure rate across all rounds.
  workers:
    type: local
    number: 8

  rounds:
    # ──────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — Org1 RBAC Write
    # ──────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Org1 issues a single certificate per transaction.
        Hash: Hybrid SHA-256 XOR BLAKE3 computed server-side.
        RBAC: Org1MSP only. Idempotent: duplicate ID returns nil (0 fail).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — Public ReadOnly
    # ──────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate authenticity against hybrid hash.
        readOnly:true bypasses orderer. Returns struct (never error).
        Zero-failure design: returns {valid:false} (not error) when cert not found.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — CouchDB Rich Query
    # ──────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Rich ledger query returning all certificates sorted by IssueDate.
        CouchDB selector with indexCertificates index hint.
        readOnly:true — direct peer query, no orderer involvement.
        Zero-failure design: returns empty slice on empty ledger.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — Org1/Org2 MSP Write
    # ──────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Revoke certificates — RBAC: OR(Org1MSP, Org2MSP).
        Marks IsRevoked=true, records RevokedBy and RevokedAt metadata.
        Zero-failure: idempotent — nil when cert not found or already revoked.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — Student-Indexed Query
    # ──────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query all certificates for a specific student using CouchDB rich query.
        Selector: {docType: "certificate", StudentID: "<id>"}.
        Uses indexStudentId CouchDB index for efficient lookup.
        Public read — any organization can query.
        Zero-failure design: returns empty slice (never nil).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Trail Query
    # ──────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Retrieve full audit trail via range scan on AUDIT_ prefix.
        Faster than CouchDB rich query for sequential prefix keys.
        Public read — any organization.
        Zero-failure: returns empty slice (never Go error).
      txNumber: 900
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
