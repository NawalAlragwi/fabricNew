# ============================================================================
#  BCMS — Scenario S3: Hybrid SHA-256 + BLAKE3
#  Hyperledger Caliper Benchmark Configuration
#  Branch: mirage-batch | Research Paper Scenario Comparison
#
#  S3 Description:
#    Hybrid hashing: SHA-256 on-chain (primary, validated) + BLAKE3 off-chain
#    (advisory, stored as metadata). This is the security-maximized model
#    combining SHA-256's blockchain universality with BLAKE3's speed.
#    S3 shows a slight TPS drop (~160-195 TPS) compared to pure BLAKE3 (~180-220)
#    due to the double-hash overhead: both SHA-256 and BLAKE3 computed per tx.
#    The overhead is small (~8-15%) because BLAKE3 computation is off-chain
#    (workload JS side) and SHA-256 remains the only on-chain cost.
#
#  Design Rationale:
#    - workers: 5  →  same as S1/S2 for fair 3-way comparison
#    - linear-rate 100→1000 TPS → finds hybrid CPU saturation point
#    - batchSize: 1  → single cert per tx for pure algorithm comparison
#    - certHash = SHA-256(fields) stored on-chain, validated by chaincode
#    - blake3Hash = BLAKE3(fields) stored as advisory metadata, NOT validated
#      This ensures 100% endorsement determinism (no BLAKE3 in WASM on peers)
#    - Double-hash overhead: client computes both SHA-256 + BLAKE3, adds ~8-15%
#      JS execution time per tx compared to S2 (BLAKE3 only)
#
#  Expected Results (after tuned configtx.yaml + GOMAXPROCS=0):
#    IssueCertificate write:  ~160-195 TPS (hybrid overhead > pure BLAKE3)
#    Avg Latency (write):     ~0.6-0.9 s  (slightly higher than S2)
#    Read rounds:             ~900-1000 TPS (no hash overhead)
#
#  Resource Monitor: Docker containers (1s interval)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-S3-hybrid-stress-benchmark
  description: >
    Scenario S3: Hybrid SHA-256 + BLAKE3 stress test.
    Linear ramp 100→1000 TPS on IssueCertificate to find the CPU bottleneck.
    Expected ~160-195 TPS — slightly less than S2 BLAKE3 due to double-hash overhead.
    certHash=SHA-256 on-chain (validated) + blake3Hash=BLAKE3 off-chain (advisory).
  workers:
    type: local
    number: 5

  rounds:
    # ────────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — Hybrid SHA-256+BLAKE3 Write Stress
    # Both SHA-256 and BLAKE3 computed per tx (double-hash overhead).
    # SHA-256 validated on-chain; BLAKE3 stored as advisory metadata.
    # batchSize: 1 — single cert per tx for fair comparison with S1/S2.
    # ────────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        S3: Hybrid write stress. Linear ramp 100→1000 TPS.
        Double-hash per tx: SHA-256(fields) + BLAKE3(fields).
        Expected saturation: ~160-195 TPS (8-15% overhead vs pure BLAKE3).
        SHA-256 validated on-chain; BLAKE3 stored as advisory metadata.
        batchSize=1: single cert per tx for S1/S2/S3 comparison.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 1000
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — Read at 1000 TPS
    # SHA-256 recomputed client-side for hash comparison. readOnly=true.
    # ────────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        S3: Hybrid verify at 1000 TPS. SHA-256 recomputed for comparison.
        readOnly=true bypasses orderer. Demonstrates read capacity.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — CouchDB at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        S3: CouchDB rich query at 1000 TPS. readOnly=true.
        No hash overhead. Pure query throughput measurement.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — Write at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        S3: Revocation write at 1000 TPS. Org2MSP RBAC.
        No hash in revoke path. Idempotent on not-found / already-revoked.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — CouchDB at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        S3: Student query at 1000 TPS. CouchDB composite index.
        readOnly=true. Zero hash overhead.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Query at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        S3: Audit log query at 1000 TPS. Returns [] in benchmark mode.
        readOnly=true. Demonstrates audit trail query capacity.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
