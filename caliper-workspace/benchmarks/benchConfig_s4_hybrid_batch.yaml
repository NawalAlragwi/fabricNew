monitors:
  resource:
  - module: docker
    options:
      interval: 1
      containers:
      - orderer.example.com
      - peer0.org1.example.com
      - couchdb0
      - peer0.org2.example.com
      - couchdb1
      - ca_org1
      - ca_org2
      - ca_orderer
test:
  name: bcms-s4-hybrid-batch-v9
  description: "Scenario S4 \u2014 Hybrid-Batch. Payload: 5 KB transcript per certificate.\
    \ batchSize: 10. Issue: 20 TPS (Stabilized). Verify: 100-500 TPS linear ramp.\
    \ Query/Revoke: 50 TPS.\n"
  workers:
    type: local
    number: 10
  rounds:
  - label: HashOnlyBenchmark
    description: HashOnlyBenchmark pure CPU test
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/hashOnlyBenchmark.js
      arguments:
        contractId: bcms-hybrid-batch
        payloadSize: 20000
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: IssueCertificate
    description: "S4 Hybrid-Batch \u2014 Issue batch certificates (batchSize=10).\
      \ Fixed-rate 20 TPS, 60 s, 10 workers.\n"
    txDuration: 60
    rateControl:
      type: fixed-rate
      opts:
        tps: 20
    workload:
      module: workload/issueCertificateBatch.js
      arguments:
        contractId: bcms-hybrid-batch
        batchSize: 10
        payloadSize: 5000
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: VerifyCertificate
    description: "S4 Hybrid-Batch \u2014 Linear-rate 100-500 TPS verify (read-only).\n"
    txDuration: 60
    rateControl:
      type: linear-rate
      opts:
        startingTps: 100
        finishingTps: 500
    workload:
      module: workload/verifyCertificate.js
      arguments:
        contractId: bcms-hybrid-batch
        totalIssued: 1000
        certPrefix: BCERT
        batchSize: 10
    txOptions:
      invokerIdentity: User1@org1.example.com
