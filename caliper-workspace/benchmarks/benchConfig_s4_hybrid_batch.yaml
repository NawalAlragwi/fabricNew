# ============================================================================
#  BCMS — Scenario S4: Hybrid-Batch (SHA-256 + BLAKE3 + Batching)
#  Hash algorithm : Hybrid (SHA-256 on-chain + BLAKE3 advisory)
#  Batch size     : 10 (ten certificates per Fabric transaction)
#  Workers        : 10 (local)
#  Transcript     : 5KB per certificate (realistic payload stress test)
#
#  FAIR COMPARISON POLICY:
#  ─────────────────────────────────────────────────────────────────────────
#  TPS and durations are IDENTICAL to S1/S2/S3 for a fair baseline comparison.
#  The only difference is the workload module uses batching (batchSize=10).
#
#  Benchmark Design:
#    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 10 workers
#    VerifyCertificate: fixed-rate 200 TPS, 60 s (read-only, no ordering)
#    QueryAllCertificates: fixed-rate 50 TPS, 60 s (CouchDB rich query)
#    RevokeCertificate: fixed-rate 200 TPS, 60 s (write, idempotent)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s4-hybrid-batch-v7
  description: >
    Scenario S4 — Hybrid-Batch (v7.0 Fair Comparison).
    Hash: Hybrid (SHA-256 on-chain, BLAKE3 advisory).
    Payload: 50KB transcript per certificate (PhD Research Stress Test).
    batchSize: 10 (ten certificates per Fabric transaction).
    IssueCertificate: linear-rate ramp 50→300 TPS, 60 s, 10 workers.
    All read rounds: fixed-rate 200 TPS, 60 s.
    TPS values are identical to S1 for fair comparison.
  workers:
    type: local
    number: 10

  rounds:

    - label: IssueCertificate
      description: >
        S4 Hybrid-Batch — Issue batch certificates (batchSize=10).
        Linear ramp 50→300 TPS, 60 s, 10 workers.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 300
      workload:
        module: workload/issueCertificateBatch.js
        arguments:
          batchSize: 10
          payloadSize: 50000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S4 Hybrid-Batch — Fixed-rate 200 TPS verify (read-only, no ordering).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
        arguments:
          totalIssued: 3000
          certPrefix: "BCERT"
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S4 Hybrid-Batch — Fixed-rate 50 TPS CouchDB rich query.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S4 Hybrid-Batch — Fixed-rate 100 TPS revocation (idempotent write).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/revokeCertificate.js
        arguments:
          certPrefix: "BCERT"
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com
