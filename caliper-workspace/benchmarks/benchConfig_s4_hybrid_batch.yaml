# ============================================================================
#  BCMS — Scenario S4: Hybrid-Batch (SHA-256 + BLAKE3 + Batching)
#  Hyperledger Caliper Benchmark Configuration
#
#  Hash algorithm : Hybrid — BLAKE3(SHA-256(data))
#  Batch size     : 10 (ten certificates per Fabric transaction)
#  Workers        : 8 (local)
#  IssueCertificate: linear-rate 50 → 200 TPS over 60 s
#  Read rounds    : fixed-rate 200 TPS, 60 s
#
#  This is the PRIMARY/OPTIMIZED scenario. Effective certificate throughput
#  = IssueCertificate TPS × batchSize (10×).
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s4-hybrid-batch
  description: >
    Scenario S4 — Hybrid-Batch (SHA-256 + BLAKE3 + Batch=10).
    batchSize: 10 (ten certificates per Fabric transaction).
    IssueCertificate: linear-rate ramp 50→200 TPS, 60 s, 8 workers.
    All read rounds: fixed-rate 200 TPS.
    Effective cert throughput = TPS × 20.
    This is the peak-performance research scenario.
  workers:
    type: local
    number: 8

  rounds:

    - label: IssueCertificate
      description: >
        S4 Hybrid-Batch — Issue 10 certificates per Fabric transaction.
        Linear ramp 50→200 TPS over 60 s (8 workers).
        Hash: BLAKE3(SHA-256(fields)) per certificate.
        MVCC-safe: no GetState inside write loop.
        Effective cert throughput at 200 TPS = 4,000 certs/sec.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 200
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 20
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: Fixed-rate 200 TPS read-only verify.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: Fixed-rate 200 TPS full ledger scan.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: Fixed-rate 200 TPS revocation (idempotent).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

