# ============================================================================
#  BCMS — Scenario S4: Hybrid-Batch (v9.0 — PERFORMANCE FIXES)
#  Hash algorithm : Hybrid (SHA-256 on-chain + BLAKE3 advisory)
#  Batch size     : 10 (ten certificates per Fabric transaction)
#  Workers        : 10
#  Transcript     : 5 KB per certificate (Reduced from 50 KB for stability)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-s4-hybrid-batch-v9
  description: >
    Scenario S4 — Hybrid-Batch.
    Payload: 5 KB transcript per certificate.
    batchSize: 10.
    Issue: 20 TPS (Stabilized).
    Verify: 100-500 TPS linear ramp.
    Query/Revoke: 50 TPS.
  workers:
    type: local
    number: 10

  rounds:
    - label: IssueCertificate
      description: >
        S4 Hybrid-Batch — Issue batch certificates (batchSize=10).
        Fixed-rate 20 TPS, 60 s, 10 workers.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/issueCertificateBatch.js
        arguments:
          contractId: bcms-hybrid-batch
          batchSize: 10
          payloadSize: 5000
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: >
        S4 Hybrid-Batch — Linear-rate 100-500 TPS verify (read-only).
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 500
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-hybrid-batch
          totalIssued: 1000
          certPrefix: "BCERT"
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: >
        S4 Hybrid-Batch — Fixed-rate 50 TPS CouchDB rich query.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-hybrid-batch
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: >
        S4 Hybrid-Batch — Fixed-rate 50 TPS revocation.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-hybrid-batch
          totalIssued: 1000
          certPrefix: "BCERT"
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com

