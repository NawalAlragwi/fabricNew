# ============================================================
#  S2 — BLAKE3 Alternative  |  Target TPS: 200
#  VerifyCertificate: 40 -> 200 TPS (PRIMARY ROUND)
#
#  PARITY with benchConfig_s1_sha256_tps200.yaml:
#  - workers: 2 (same as SHA-256)
#  - IssueCertificate: 30 TPS (same as SHA-256)
#  - QueryAllCertificates: 16 TPS (same as SHA-256)
#  - RevokeCertificate: 16 TPS (same as SHA-256)
#  - HashOnlyBenchmark: 100 TPS (same as SHA-256)
#  - VerifyCertificate: 40->200 TPS (same as SHA-256 - PRIMARY ROUND)
#
#  ONLY DIFFERENCE vs SHA-256: contractId = bcms-blake3
#  This guarantees any performance gap = algorithm difference only.
# ============================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1

test:
  name: bcms-s2-blake3-tps200
  description: >
    Scenario S2 BLAKE3 Alternative at 200 TPS target.
    VerifyCertificate: linear 40->200 TPS (PRIMARY COMPARISON ROUND).
    MagnificationFactor x3000 = 12ms per tx (3.74x faster than SHA-256 45ms).
    Expected: BLAKE3 stable at 200 TPS while SHA-256 saturates.
  workers:
    type: local
    number: 2

  rounds:

    # ── Round 1: Issue (identical to SHA-256 config) ──────────────────
    - label: IssueCertificate
      description: Issue certs at 30 TPS, 60s (parity with SHA-256 config)
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/issueCertificate.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 2: PRIMARY COMPARISON ROUND (identical range to SHA-256) ──
    - label: VerifyCertificate
      description: >
        PRIMARY ROUND — BLAKE3 linear 40->200 TPS, 120s.
        MagnificationFactor x3000 = 12ms per tx (AVX2 SIMD).
        Expected: BLAKE3 remains extremely fast and stable.
        Compare directly with SHA-256 which uses same 40->200 TPS range.
      txDuration: 30
      rateControl:
        type: linear-rate
        opts:
          startingTps: 40
          finishingTps: 200
      workload:
        module: workload/verifyCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 1800
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 3: Query (identical to SHA-256 config) ──────────────────
    - label: QueryAllCertificates
      description: I/O-bound query 16 TPS, 60s (parity with SHA-256 config)
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 16
      workload:
        module: workload/queryAllCertificates.js
        arguments:
          contractId: bcms-blake3
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 4: Revoke (identical to SHA-256 config) ─────────────────
    - label: RevokeCertificate
      description: Flag-only revoke 16 TPS, 60s (no hash recomputation)
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 16
      workload:
        module: workload/revokeCertificate.js
        arguments:
          contractId: bcms-blake3
          totalIssued: 1800
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── Round 5: HashOnly (identical TPS to SHA-256 — key comparison) ─
    - label: HashOnlyBenchmark
      description: >
        Pure CPU hash isolation at 100 TPS, 60s (parity with SHA-256 config).
        BLAKE3 x3000 = 12ms/tx -> 100 TPS = 1200ms CPU/s -> stable.
        SHA-256 x3000 = 45ms/tx -> 100 TPS = 4500ms CPU/s -> saturates.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/hashOnlyBenchmark.js
        arguments:
          contractId: bcms-blake3
          payloadSize: 20000
      txOptions:
        invokerIdentity: User1@org1.example.com
