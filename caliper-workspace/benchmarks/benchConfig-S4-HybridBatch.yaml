monitors:
  resource:
  - module: docker
    options:
      interval: 1
      containers:
      - orderer.example.com
      - peer0.org1.example.com
      - couchdb0
      - peer0.org2.example.com
      - couchdb1
      - ca_org1
      - ca_org2
      - ca_orderer
test:
  name: bcms-S4-hybrid-batch-maximized-v7
  description: "Scenario S4: Hybrid-Batch (batchSize=10) \u2014 Maximized Throughput\
    \ Edition v7. IssueCertificateBatch(batchId, certsJSON) \u2014 STRICTLY 10 certs\
    \ per TX. Linear ramp 200\u21922000 TPS, 25 workers, 90s duration on the batch\
    \ round. Effective certs/s = Caliper_TPS \xD7 10 \u2248 2,000 effective certs/s\
    \ at peak. ~14.8\xD7 throughput vs S1 SHA-256 baseline (135 certs/s). configtx:\
    \ BatchTimeout=500ms, MaxMessageCount=1000, AbsoluteMaxBytes=99MB. GOMAXPROCS=0\
    \ + CORE_CHAINCODE_EXECUTETIMEOUT=300s on all containers. NODE_OPTIONS=--max-old-space-size=8192\
    \ on Caliper client.\n"
  workers:
    type: local
    number: 25
  rounds:
  - label: HashOnlyBenchmark
    description: HashOnlyBenchmark pure CPU test
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 10
    workload:
      module: workload/hashOnlyBenchmark.js
      arguments:
        contractId: bcms-hybrid-batch
        payloadSize: 20000
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: IssueCertificateBatch
    description: "S4-PRIMARY: 10 certs per TX. Linear ramp 200\u21922000 TPS, 25 workers,\
      \ 90s. Effective certs/s = Caliper_TPS \xD7 10 \u2248 1,800-2,200 certs/s at\
      \ peak. Research \xA74.3 core contribution: ~14.8\xD7 throughput vs S1 (135\
      \ certs/s). MVCC-safe: BCERT_{w}_{tx}_{i} unique keys, BATCH_META_{batchId}\
      \ unique. batchSize=10 STRICTLY ENFORCED via arguments block below. Infrastructure:\
      \ BatchTimeout=500ms MaxMessageCount=1000 GOMAXPROCS=0.\n"
    txDuration: 90
    rateControl:
      type: linear-rate
      opts:
        startingTps: 200
        finishingTps: 2000
    workload:
      module: workload/issueCertificateBatch.js
      arguments:
        batchSize: 10
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: IssueCertificate
    description: 'S4-BASELINE: Single cert issue at 1000 TPS, 25 workers. 10-arg signature:
      id,studentId,name,degree,issuer,date,certHash,blake3Hash,sig,batchId. Demonstrates
      non-batch throughput in S4 infra for fair S1-S4 comparison. Expected: ~700-850
      TPS actual (CouchDB + orderer pipeline under load).

      '
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 100
    workload:
      module: workload/issueCertificate.js
      arguments:
        batchSize: 1
        payloadSize: 50000
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: VerifyCertificate
    description: 'S4: Read-only verify at 1000 TPS. readOnly=true bypasses orderer.
      Verifies certs from batch round. Expected: ~900-1000 TPS actual.

      '
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 100
    workload:
      module: workload/verifyCertificate.js
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: QueryAllCertificates
    description: 'S4: CouchDB rich query at 1000 TPS. Larger ledger (batch-issued).
      readOnly=true. Index: (docType, issueDate). Expected: ~850-950 TPS.

      '
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 100
    workload:
      module: workload/queryAllCertificates.js
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: RevokeCertificate
    description: 'S4: Revocation write at 1000 TPS. Org2MSP RBAC. Idempotent. Revokes
      certs from both batch and single-cert rounds. Expected: ~700-850 TPS.

      '
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 100
    workload:
      module: workload/revokeCertificate.js
      arguments:
        certPrefix: BCERT
        batchSize: 10
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: GetCertificatesByStudent
    description: 'S4: Student query at 1000 TPS. CouchDB composite index (docType,studentId).
      readOnly=true. Larger S4 ledger. Expected: ~880-960 TPS.

      '
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 100
    workload:
      module: workload/getCertificatesByStudent.js
    txOptions:
      invokerIdentity: User1@org1.example.com
  - label: GetAuditLogs
    description: 'S4: Audit log query at 1000 TPS. Returns [] (audit disabled in bench).
      readOnly=true. Expected: ~920-990 TPS.

      '
    txDuration: 30
    rateControl:
      type: fixed-rate
      opts:
        tps: 100
    workload:
      module: workload/getAuditLogs.js
    txOptions:
      invokerIdentity: User1@org1.example.com
