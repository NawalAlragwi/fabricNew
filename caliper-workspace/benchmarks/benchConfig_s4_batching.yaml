# ============================================================================
#  BCMS Benchmark — Scenario 4: Hybrid + Batching Optimization
#  10 certificates bundled per transaction (batchSize=10).
#  Chaincode: chaincode-bcms/hybrid-batch
#
#  Key advantages over S1/S2/S3:
#  - 10x certificates per Fabric TX → 10x effective cert throughput
#  - 80% reduction in consensus rounds per 100 certificates
#  - World-state puts: 10 per TX vs 1 (batch efficiency)
#  - Average latency reduced due to fewer orderer round-trips
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - peer0.org2.example.com

test:
  name: bcms-s4-hybrid-batch-optimized
  description: >
    Hybrid-batch optimized benchmark. 10 certs bundled per Fabric TX.
    Maximum certificate throughput via batching + SHA-256+BLAKE3 hybrid hash.
    Demonstrates optimal performance for high-volume certificate issuance.
  workers:
    type: local
    number: 8

  rounds:

    - label: IssueCertificate
      description: >
        Batch-issue 10 certificates per Fabric TX.
        Hybrid hash: BLAKE3(SHA-256(fields)). MVCC-safe unique keys.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: Verify certificate existence (hybrid+batch mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: Full ledger scan (hybrid+batch mode, larger dataset).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: Revoke certificates (hybrid+batch mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    - label: GetCertificatesByStudent
      description: Per-student query (hybrid+batch, dense dataset).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: GetAuditLogs
      description: Audit trail query (hybrid+batch mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
