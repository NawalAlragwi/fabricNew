# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v7.0 (hyper-pach)
#
#  ── Change-log v7.0 ─────────────────────────────────────────────────────────
#
#  REQUEST-1 [IssueCertificate — hyper-pach config]:
#    workers: type: local, number: 5
#    txDuration: 60 s
#    rateControl: fixed-rate  tps: 20
#    batchSize: 10  → 20 TPS × 10 certs = ~100 certs/s effective throughput
#
#  REQUEST-2 [Read-operation rounds — fixed-rate 1000 TPS]:
#    All read operations (VerifyCertificate, QueryAllCertificates,
#    GetCertificatesByStudent, GetAuditLogs) at 1000 TPS.
#    RevokeCertificate remains write-mode but also at 1000 TPS.
#
#  REQUEST-3 [batchSize per scenario]:
#    This config represents the Hybrid-Batch scenario → batchSize: 10
#    See companion configs for S1/S2/S3 with batchSize: 1.
#    See benchConfig-hyper-pach.yaml for BatchIssueCertificates workload.
#
#  NODE_OPTIONS: --max-old-space-size=8192  (prevent OOM under high load)
# ============================================================================

# ── Resource Monitors ────────────────────────────────────────────────────────
monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

# ── Test Suite ───────────────────────────────────────────────────────────────
test:
  name: bcms-hybrid-batch-benchmark-v7-hyper-pach
  description: >
    BCMS Full Benchmark Suite — Hyper-Pach Framework (SHA-256 + BLAKE3).
    6 rounds covering all chaincode functions.
    IssueCertificate: fixed-rate 20 TPS × batchSize 10 = 100 certs/s effective.
    All read-operation rounds: fixed-rate 1000 TPS.
    NODE_OPTIONS=--max-old-space-size=8192 to prevent OOM under high load.
    Target: 0% failure rate on all rounds.
  workers:
    type: local
    number: 5

  rounds:

    # ──────────────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — Hyper-Pach Batch Write
    #
    # fixed-rate 20 TPS × batchSize 10 = ~100 certificates/second effective.
    # txDuration: 60 s
    # MVCC-safe: each cert gets unique key CERT_{worker}_{index}.
    # ──────────────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Issue certificates via Hyper-Pach framework (SHA-256 + BLAKE3).
        fixed-rate 20 TPS, batchSize=10 → 100 effective certs/s.
        MVCC-safe unique key per cert. Zero-failure design.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 10
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — Read-Only, 200 TPS
    #
    # inputHash="" → chaincode performs existence+not-revoked check only.
    # readOnly:true bypasses orderer for maximum peer throughput.
    # ──────────────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate existence on the ledger (readOnly peer query).
        Fixed-rate 1000 TPS. inputHash is empty — existence check only.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — Full Ledger Scan, 200 TPS
    #
    # GetStateByRange("","") — works on LevelDB and CouchDB.
    # readOnly:true — direct peer query.
    # ──────────────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Scan and return all certificate records from the ledger.
        Fixed-rate 1000 TPS. Filters by docType=="certificate".
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — Org2 RBAC Write, 200 TPS
    #
    # Idempotent: nil when cert not found or already revoked → 0 failures.
    # certID pattern matches IssueCertificate to target real certs.
    # ──────────────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Revoke certificates. Idempotent: nil when cert not found or revoked.
        Fixed-rate 1000 TPS. Targets certs issued in round 1.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — Per-Student Query, 200 TPS
    #
    # readOnly:true — direct peer query.
    # studentID pattern matches IssueCertificate keys.
    # ──────────────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query all certificates for a specific student.
        Fixed-rate 1000 TPS. studentID aligned with IssueCertificate keys.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Trail Query, 200 TPS
    #
    # Scans "AUDIT_" … "AUDIT_~" key range.
    # readOnly:true — direct peer query.
    # ──────────────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the immutable audit trail. Fixed-rate 1000 TPS.
        Efficient range scan on AUDIT_ key prefix.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
