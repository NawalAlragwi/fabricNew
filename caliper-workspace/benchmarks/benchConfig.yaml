# إعدادات المراقبة
monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1

test:
  name: bcms-certificate-benchmark-v4
  description: "BCMS Full Benchmark Suite"
  workers:
    type: local
    number: 8
  rounds:
    # الجولة الأولى: إصدار الشهادات بالدفعة (Proposed Hybrid-Batch)
    - label: IssueCertificate
      description: "Org1 issues certificates using the Hybrid-Batch Framework."
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # الجولة الثانية: التحقق من الشهادات
    - label: VerifyCertificate
      description: "Verify certificate authenticity via Hybrid Hash."
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # الجولة الثالثة: الاستعلام عن كل الشهادات
    - label: QueryAllCertificates
      description: "Rich ledger query for all certificates."
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 2
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com
