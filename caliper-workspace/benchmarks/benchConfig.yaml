# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Batch-First Benchmark Configuration (PhD Resilience Edition)
#  Target: 6 Optimized Rounds using Application-Level Batching
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - couchdb0
          - couchdb1

test:
  name: bcms-batch-optimized-benchmark
  description: >
     Evaluation of BCMS Batching Performance for PhD Thesis.
     Focus: High Throughput, Low Latency, and Zero Failure Rate.
  workers:
    type: local
    number: 4  # Reduced from 8 to 4 to ensure stability on WSL environment
  rounds:
    # --- Round 1: BatchIssueCertificates (Phase 3 Optimized) ---
    - label: BatchIssueCertificates
      description: Issues 5 certificates per transaction using Hybrid Hash.
      txNumber: 400
      rateControl:
        type: fixed-rate
        opts:
          tps: 20  # Effective throughput: 100 certificates/second
      workload:
        module: workload/batchIssueCertificate.js
      postIterationWaitTime: 30000  # Longer cooldown to allow CouchDB indexing to catch up

    # --- Round 2: BatchVerifyCertificates (Read-Only Optimized) ---
    - label: BatchVerifyCertificates
      description: Verifies 5 certificates per query. Bypasses orderer for speed.
      txNumber: 800
      rateControl:
        type: fixed-rate
        opts:
          tps: 40  # Effective throughput: 200 verifications/second
      workload:
        module: workload/batchVerifyCertificate.js
      postIterationWaitTime: 20000

    # --- Round 3: QueryAllCertificates (Rich Query) ---
    - label: QueryAllCertificates
      description: Retrieve all certificates using GetStateByRange.
      txNumber: 400
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/queryAllCertificates.js
      postIterationWaitTime: 20000

    # --- Round 4: BatchRevokeCertificates (Phase 3 Optimized) ---
    - label: BatchRevokeCertificates
      description: Bulk revocation of 5 certificates per transaction.
      txNumber: 400
      rateControl:
        type: fixed-rate
        opts:
          tps: 15  # Lower TPS for revocation to prevent MVCC conflicts with indexes
      workload:
        module: workload/batchRevokeCertificate.js
      postIterationWaitTime: 30000

    # --- Round 5: GetCertificatesByStudent (CouchDB Query) ---
    - label: GetCertificatesByStudent
      description: Query certificates by studentID using CouchDB rich query.
      txNumber: 600
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getCertificatesByStudent.js
      postIterationWaitTime: 20000

    # --- Round 6: GetAuditLogs (Transparency Feature) ---
    - label: GetAuditLogs
      description: Retrieve immutable audit trail.
      txNumber: 300
      rateControl:
        type: fixed-rate
        opts:
          tps: 15
      workload:
        module: workload/getAuditLogs.js
      postIterationWaitTime: 15000
