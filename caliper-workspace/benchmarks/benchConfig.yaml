# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v4.2 (PhD Research Edition)
#  Research Paper: "Enhancing Trust and Transparency in Education Using
#                  Blockchain: A Hyperledger Fabric-Based Framework"
#
#  PRECISION FIXES:
#    1. Fixed YAML Indentation (Error at line 66 resolved).
#    2. Replaced txDuration with txNumber for deterministic PhD results.
#    3. Updated TPS targets for high-performance scenarios.
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - /orderer.example.com
          - /peer0.org1.example.com
          - /couchdb0
          - /peer0.org2.example.com
          - /couchdb1
          - /ca_org1
          - /ca_org2
          - /ca_orderer

test:
  name: bcms-certificate-benchmark-v4
  description: >
    BCMS Full Benchmark Suite — Research Paper Implementation.
    Tests all 6 chaincode functions across SHA-256/BLAKE3 crypto,
    and audit logging. Target: 0% failure rate with fixed transaction counts.
  workers:
    type: local
    number: 8

  rounds:
    # ──────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — Proposed Hybrid-Batch Model
    # Calculation: 50 TPS * 30s = 1500 Transactions
    # ──────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Org1 issues certificates using the Proposed Hybrid-Batch Framework.
        Security: Double-Hash (SHA-256 + BLAKE3).
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — High Throughput Read
    # Calculation: 200 TPS * 30s = 6000 Transactions
    # ──────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate authenticity by recomputing hashes.
        Public read — readOnly:true bypasses orderer for maximum throughput.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — Ledger Performance
    # Calculation: 100 TPS * 30s = 3000 Transactions
    # ──────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Rich ledger query returning all certificates using CouchDB.
        Zero-failure design: direct peer query.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — RBAC Authorization
    # Calculation: 100 TPS * 30s = 3000 Transactions
    # ──────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Org2 revokes certificates — Marks IsRevoked=true with audit logging.
        Tests write transaction performance with RBAC.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — Indexed Query
    # Calculation: 75 TPS * 30s = 2250 Transactions
    # ──────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query certificates for a specific student using CouchDB selector.
        Public read access.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Trail Inspection
    # Calculation: 30 TPS * 30s = 900 Transactions
    # ──────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the immutable audit log trail from the ledger.
        Returns entries sorted by timestamp descending.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com