# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Research Consistency Configuration (Fair Baseline Comparison)
#  Target: Identical Transaction Load as SHA-256 and Mirage-New branches.
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - couchdb0
          - couchdb1

test:
  name: bcms-fair-comparison-batch-benchmark
  description: >
     Comparison of Batching performance against baseline models.
     Load (TPS/txNumber) is kept identical to ensure scientific consistency.
  workers:
    type: local
    number: 8
  rounds:
    # --- Round 1: BatchIssueCertificates (Standard Load: 50 TPS) ---
    - label: BatchIssueCertificates
      description: Issues 5 certificates per tx. Effective: 250 cert/s.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/batchIssueCertificate.js
      postIterationWaitTime: 20000

    # --- Round 2: BatchVerifyCertificates (Standard Load: 100 TPS) ---
    - label: BatchVerifyCertificates
      description: Verifies 5 certificates per query. Effective: 500 verif/s.
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/batchVerifyCertificate.js
      postIterationWaitTime: 15000

    # --- Round 3: QueryAllCertificates (Standard Load: 50 TPS) ---
    - label: QueryAllCertificates
      description: Rich ledger query returning all certificates.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      postIterationWaitTime: 15000

    # --- Round 4: BatchRevokeCertificates (Standard Load: 50 TPS) ---
    - label: BatchRevokeCertificates
      description: Bulk revocation of 5 certificates per tx. Effective: 250 revoke/s.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/batchRevokeCertificate.js
      postIterationWaitTime: 20000

    # --- Round 5: GetCertificatesByStudent (Standard Load: 75 TPS) ---
    - label: GetCertificatesByStudent
      description: Query certificates for a specific student using CouchDB index.
      txNumber: 2250
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      postIterationWaitTime: 15000

    # --- Round 6: GetAuditLogs (Standard Load: 30 TPS) ---
    - label: GetAuditLogs
      description: Retrieve paginated audit logs via range scan.
      txNumber: 900
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      postIterationWaitTime: 10000
