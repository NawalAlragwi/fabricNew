# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration — BLAKE3 Mode
#  Branch: fabric-blake3
#
#  Research: "Enhancing Trust and Transparency in Education Using
#             Blockchain: A Hyperledger Fabric-Based Framework"
#
#  Migration: SHA-256 → BLAKE3
#    Chaincode: chaincode-bcms/blake3 (github.com/zeebo/blake3)
#    Client:    blake3 npm package (computeBlake3Hash)
#    On-chain:  HashAlgorithm: "BLAKE3" recorded per certificate
#
#  Benchmark Design:
#    - 6 rounds covering all chaincode functions
#    - Fixed-rate TPS IDENTICAL to SHA-256 baseline for scientific validity
#      (apples-to-apples comparison — only hash algorithm changes)
#    - TPS values: 50, 100, 50, 50, 75, 30 (preserved from baseline)
#    - txNumber: TPS * 30s (matches baseline transaction counts exactly)
#    - workers: 8 (same as baseline)
#    - Audit logging: DISABLED for max TPS (matches baseline optimization)
#
#  Expected BLAKE3 vs SHA-256 performance delta:
#    IssueCertificate write:  BLAKE3 ≥ SHA-256 (3–10× faster hash compute)
#    Latency (write):         BLAKE3 < SHA-256 (lower hash overhead)
#    Read rounds:             BLAKE3 ≈ SHA-256 (no hash overhead in reads)
#    Fail Rate target:        0.00% across all 14,550+ transactions
#
#  Resource Monitor: Docker containers (1s interval)
#    Captures CPU/RAM for peer0.org1, peer0.org2, orderer, CouchDB
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - /orderer.example.com
          - /peer0.org1.example.com
          - /couchdb0
          - /peer0.org2.example.com
          - /couchdb1
          - /ca_org1
          - /ca_org2
          - /ca_orderer

test:
  name: bcms-blake3-certificate-benchmark
  description: >
    BCMS BLAKE3 Benchmark Suite — fabric-blake3 branch.
    SHA-256 → BLAKE3 migration study. 6 rounds, 8 workers.
    All TPS settings identical to SHA-256 baseline for valid comparison.
    Chaincode: chaincode-bcms/blake3 | Hash: github.com/zeebo/blake3.
    On-chain records include HashAlgorithm: "BLAKE3" for auditability.
    Audit logging disabled for maximum throughput benchmark.
    Target: 0.00% fail rate across all 14,550+ transactions.
  workers:
    type: local
    number: 8

  rounds:
    # ──────────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — BLAKE3 Write Benchmark
    # Fixed-rate 50 TPS × 30s = 1500 transactions (identical to SHA-256 baseline)
    # BLAKE3 hash computed client-side (blake3 npm) and validated on-chain.
    # Each cert records HashAlgorithm: "BLAKE3" explicitly.
    # ID: CERT_B3_{worker}_{index} — unique per worker, idempotent on duplicate.
    # ──────────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        BLAKE3 write benchmark. Fixed-rate 50 TPS × 30s = 1500 transactions.
        BLAKE3 hash computed client-side (blake3 npm package) and validated on-chain.
        On-chain certificate records HashAlgorithm: "BLAKE3" for auditability.
        ID pattern: CERT_B3_{worker}_{index}. MVCC-safe: unique keys, idempotent.
        Audit logging disabled for maximum TPS (matches SHA-256 baseline config).
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — BLAKE3 Read Benchmark
    # Fixed-rate 100 TPS × 30s = 3000 transactions (identical to SHA-256 baseline)
    # readOnly: true — bypasses orderer for maximum read throughput.
    # BLAKE3 hash recomputed client-side for on-chain hash-match comparison.
    # ──────────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        BLAKE3 read benchmark. Fixed-rate 100 TPS × 30s = 3000 transactions.
        Verify certificate authenticity — recomputes BLAKE3 hash client-side.
        readOnly=true bypasses orderer for max throughput.
        Returns VerificationResult with hashAlgorithm: "BLAKE3" confirmed.
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — CouchDB Rich Query Benchmark
    # Fixed-rate 50 TPS × 30s = 1500 transactions (identical to SHA-256 baseline)
    # No hashing overhead — pure CouchDB query throughput measurement.
    # ──────────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        CouchDB rich query benchmark. Fixed-rate 50 TPS × 30s = 1500 transactions.
        Returns all certificates (each with HashAlgorithm: "BLAKE3" field).
        readOnly=true — direct peer query, no orderer involvement.
        Pure query throughput — no hash computation overhead.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — BLAKE3 Write (Revocation Path)
    # Fixed-rate 50 TPS × 30s = 1500 transactions (identical to SHA-256 baseline)
    # No hash computation in revocation path — tests write throughput without hash.
    # Idempotent: nil on cert-not-found or already-revoked.
    # ──────────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Revocation write benchmark. Fixed-rate 50 TPS × 30s = 1500 transactions.
        No hash computation in revocation path. Org2MSP RBAC enforced.
        ID pattern: CERT_B3_{worker}_{index}. Idempotent on not-found/already-revoked.
        Tests ledger write throughput without hashing overhead.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — CouchDB Composite Index Benchmark
    # Fixed-rate 75 TPS × 30s = 2250 transactions (identical to SHA-256 baseline)
    # CouchDB composite index on StudentID for efficient student cert queries.
    # ──────────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Student query benchmark. Fixed-rate 75 TPS × 30s = 2250 transactions.
        CouchDB composite index on StudentID. readOnly=true.
        Returns certificates for student from BLAKE3 issuance round.
        No hash overhead — pure query throughput measurement.
      txNumber: 2250
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Query Benchmark
    # Fixed-rate 30 TPS × 30s = 900 transactions (identical to SHA-256 baseline)
    # Returns [] in benchmark mode (audit logging disabled for max TPS).
    # ──────────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Audit log query benchmark. Fixed-rate 30 TPS × 30s = 900 transactions.
        Returns empty [] in benchmark mode (audit logging disabled).
        readOnly=true. Demonstrates audit trail query capacity (BLAKE3 mode).
      txNumber: 900
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
