# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Standardized Benchmark Configuration (Fair Comparison Edition)
#  Target: Identical to SHA-256 Baseline for PhD Research
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - couchdb0
          - couchdb1

test:
  name: bcms-fair-comparison-benchmark
  description: >
    Standardized suite for fair comparison between SHA-256 and BLAKE3.
    Identical transaction counts and rate controls.
  workers:
    type: local
    number: 8  # مطابق تماماً لتقرير SHA-256 الأصلي

  rounds:
    # --- Round 1: IssueCertificate (Fixed 50 TPS) ---
    - label: IssueCertificate
      txNumber: 1500  # مطابق لعدد المعاملات في تقريرك المرجعي
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # --- Round 2: VerifyCertificate (Fixed 100 TPS) ---
    - label: VerifyCertificate
      txNumber: 3000  # مطابق للتقرير الأصلي
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # --- Round 3: QueryAllCertificates (Reduced — each query fetches full ledger) ---
    - label: QueryAllCertificates
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # --- Round 4: RevokeCertificate (Fixed 50 TPS) ---
    - label: RevokeCertificate
      txNumber: 1500  # مطابق للتقرير الأصلي
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # --- Round 5: GetCertificatesByStudent (Fixed 75 TPS) ---
    - label: GetCertificatesByStudent
      txNumber: 2250  # مطابق للتقرير الأصلي
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # --- Round 6: GetAuditLogs (Fixed 30 TPS) ---
    - label: GetAuditLogs
      txNumber: 900  # مطابق للتقرير الأصلي
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com