# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v6.1 (Fixed)
# ============================================================================

# ── Resource Monitors ────────────────────────────────────────────────────────
monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

# ── Test Suite ───────────────────────────────────────────────────────────────
test:
  name: bcms-hybrid-batch-benchmark-v6
  description: >
    BCMS Full Benchmark Suite — Hybrid-Batch Framework (BLAKE3).
    6 rounds covering all chaincode functions.
    IssueCertificate: linear-rate 50→500 TPS over 60 s, 5 workers.
    All read-operation rounds: fixed-rate 200 TPS.
  workers:
    type: local
    number: 5

  rounds:

    # ──────────────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — Write Stress Test
    # ──────────────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Issue certificates using BLAKE3 hash.
        Linear ramp 50→500 TPS over 60 seconds. MVCC-safe.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 50
          finishingTps: 500
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — Read-Only, 200 TPS
    # ──────────────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate existence on the ledger (readOnly peer query).
        Fixed-rate 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        # ✅ إصلاح: نقل التعليق لسطر منفصل بعيداً عن قيمة module
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — Full Ledger Scan, 200 TPS
    # ──────────────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Scan and return all certificate records from the ledger.
        Fixed-rate 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — Write, 200 TPS
    # ──────────────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Revoke certificates. Idempotent design — zero failures.
        Fixed-rate 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — Read-Only, 200 TPS
    # ──────────────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query all certificates for a specific student.
        Fixed-rate 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Read-Only, 200 TPS
    # ──────────────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the immutable audit trail. Fixed-rate 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com