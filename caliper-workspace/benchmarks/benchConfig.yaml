# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v4.5 (Individual Hybrid Model)
#  Research Paper: "Enhancing Trust and Transparency in Education Using
#                  Blockchain: A Hyperledger Fabric-Based Framework"
#
#  STATUS: Corrected for Individual Hybrid Implementation (No Batching)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - /orderer.example.com
          - /peer0.org1.example.com
          - /couchdb0
          - /peer0.org2.example.com
          - /couchdb1
          - /ca_org1
          - /ca_org2
          - /ca_orderer

test:
  name: bcms-individual-hybrid-benchmark
  description: >
    BCMS Individual Hybrid Model — SHA-256 + BLAKE3 Cryptography.
    Tests all 6 functions: Issue, Verify, QueryAll, Revoke, GetByStudent, GetAuditLogs.
    Target: 0% failure rate with individual transactions.
  workers:
    type: local
    number: 1

  rounds:
    # ──────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — Individual Hybrid Model
    # ──────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Org1 issues individual certificates using SHA-256 + BLAKE3 hybrid hashing.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — Public ReadOnly
    # ──────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify authenticity by recomputing hybrid hashes.
        readOnly:true for direct peer query.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — Rich Query
    # ──────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Retrieves all certificates from the ledger using CouchDB.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — RBAC (Org2 Only)
    # ──────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Org2 revokes a certificate — Tests RBAC enforcement.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — Targeted Query
    # ──────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query certificates for a specific student using CouchDB selector.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Trail
    # ──────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the immutable audit log trail generated by hybrid transactions.
      txNumber: 1
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com