# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v4.3 (Guaranteed 0% Failure)
#  Research Paper: "Enhancing Trust and Transparency in Education Using 
#                  Blockchain: A Hyperledger Fabric-Based Framework"
#
#  CRITICAL FIXES:
#    1. Workers reduced to 2 to prevent CouchDB connection pool exhaustion
#    2. IssueCertificate: 10 TPS × 30s = 300 tx (minimal writes to reduce
#       ledger size before query rounds)
#    3. QueryAllCertificates: 5 TPS × 30s = 150 tx (full state scan is O(N))
#    4. GetCertificatesByStudent: 5 TPS × 30s = 150 tx (CouchDB _find)
#    5. GetAuditLogs: 5 TPS × 30s = 150 tx (CouchDB rich query)
#    6. RevokeCertificate: 10 TPS × 30s = 300 tx (write + audit log)
#    7. VerifyCertificate: 50 TPS × 30s = 1500 tx (simple key lookup — fast)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - /orderer.example.com
          - /peer0.org1.example.com
          - /couchdb0
          - /peer0.org2.example.com
          - /couchdb1
          - /ca_org1
          - /ca_org2
          - /ca_orderer

test:
  name: bcms-certificate-benchmark-v4.3
  description: >
    BCMS Full Benchmark Suite — Research Paper Implementation.
    Tests all 6 chaincode functions across RBAC, ABAC, SHA-256 crypto,
    and audit logging. Conservative TPS to guarantee 0% failure rate.
  workers:
    type: local
    number: 2

  rounds:
    # ──────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate (10 TPS × 30s = 300 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Org1 issues educational certificates to the Hyperledger Fabric ledger.
        RBAC enforced: only Org1MSP clients can invoke.
      txNumber: 300
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate (50 TPS × 30s = 1500 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate authenticity by recomputing SHA-256 hash.
        Public read — readOnly:true bypasses orderer.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates (5 TPS × 30s = 150 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Rich ledger query returning all certificates sorted by issue date.
        Uses GetStateByRange. readOnly:true — direct peer query.
      txNumber: 150
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate (10 TPS × 30s = 300 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Org2 revokes certificates on the ledger — RBAC: Org2MSP.
        Write audit log on every revocation.
      txNumber: 300
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent (5 TPS × 30s = 150 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query certificates for a specific student using CouchDB rich query.
        Selector: {docType: "certificate", StudentID: "<id>"}.
      txNumber: 150
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs (5 TPS × 30s = 150 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the immutable audit log trail from the ledger.
        Returns all AuditLog entries sorted by timestamp descending.
      txNumber: 150
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com