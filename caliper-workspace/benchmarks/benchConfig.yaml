# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v4.1 (BLAKE3 Optimized)
#  Research Paper: "Enhancing Trust and Transparency in Education Using 
#                  Blockchain: A Hyperledger Fabric-Based Framework"
#
#  Migration: SHA-256 -> BLAKE3 (Merkle Tree Based Hashing)
#  Goal: Compare TPS/Latency vs SHA-256 baseline.
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - /orderer.example.com
          - /peer0.org1.example.com
          - /couchdb0
          - /peer0.org2.example.com
          - /couchdb1
          - /ca_org1
          - /ca_org2
          - /ca_orderer

test:
  name: bcms-blake3-certificate-benchmark
  description: >
    BCMS Full Benchmark Suite — BLAKE3 Implementation Study.
    Tests all 6 chaincode functions utilizing BLAKE3 cryptographic hashing.
    Target: 0% failure rate with optimized CouchDB indexing.
  workers:
    type: local
    number: 8

  rounds:
    # ──────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate (BLAKE3 Writing)
    # ──────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Org1 issues certificates. BLAKE3 hash computed client-side 
        and validated on-chain. RBAC: Org1MSP.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js # تأكدي أن هذا الملف يستخدم مكتبة blake3
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate (BLAKE3 Verification)
    # ──────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate authenticity by recomputing BLAKE3 hash.
        Bypasses orderer for direct peer performance measurement.
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js # تأكدي أن هذا الملف يستخدم مكتبة blake3
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates
    # ──────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Rich ledger query. Measures BLAKE3-tagged record retrieval speed.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate
    # ──────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Org2 revokes certificates — RBAC: Org2MSP.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent (CouchDB Index Test)
    # ──────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query by student ID. Crucial for verifying CouchDB Index performance 
        with BLAKE3 records.
      txNumber: 2250
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs
    # ──────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the audit log trail. (Audit logging remains disabled in chaincode 
        for pure throughput testing).
      txNumber: 900
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
