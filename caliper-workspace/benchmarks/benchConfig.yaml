# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Hyperledger Caliper Benchmark Configuration v4.1 (Fixed Transaction Count)
#  Research Paper: "Enhancing Trust and Transparency in Education Using 
#                  Blockchain: A Hyperledger Fabric-Based Framework"
#
#  Rounds updated from txDuration (Time) to txNumber (Count) for research precision.
#  All calculations based on: TPS * 30 seconds.
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - /orderer.example.com
          - /peer0.org1.example.com
          - /couchdb0
          - /peer0.org2.example.com
          - /couchdb1
          - /ca_org1
          - /ca_org2
          - /ca_orderer

test:
  name: bcms-certificate-benchmark-v4
  description: >
    BCMS Full Benchmark Suite — Research Paper Implementation.
    Tests all 6 chaincode functions across RBAC, ABAC, SHA-256 crypto,
    and audit logging. Target: 0% failure rate with fixed transaction counts.
  workers:
    type: local
    number: 8

  rounds:
    # ──────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate (50 TPS * 30s = 1500 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        Org1 issues educational certificates to the Hyperledger Fabric ledger.
        RBAC enforced: only Org1MSP clients can invoke.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate (100 TPS * 30s = 3000 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        Verify certificate authenticity by recomputing SHA-256 hash.
        Public read — readOnly:true bypasses orderer.
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates (50 TPS * 30s = 1500 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        Rich ledger query returning all certificates sorted by issue date.
        Uses CouchDB selector. readOnly:true — direct peer query.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate (50 TPS * 30s = 1500 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        Org2 revokes certificates on the ledger — RBAC: Org2MSP.
        Write audit log on every revocation.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent (75 TPS * 30s = 2250 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        Query certificates for a specific student using CouchDB rich query.
        Selector: {docType: "certificate", StudentID: "<id>"}.
      txNumber: 2250
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ──────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs (30 TPS * 30s = 900 Transactions)
    # ──────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        Query the immutable audit log trail from the ledger.
        Returns all AuditLog entries sorted by timestamp descending.
      txNumber: 900
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com