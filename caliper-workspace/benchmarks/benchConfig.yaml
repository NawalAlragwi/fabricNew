# ============================================================================
#  BCMS — Blockchain Certificate Management System
#  Standardized Benchmark Configuration (Fair Comparison Edition)
#  Target: Identical to SHA-256 Baseline for PhD Research
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - peer0.org1.example.com
          - peer0.org2.example.com
          - orderer.example.com
          - couchdb0
          - couchdb1

test:
  name: bcms-fair-comparison-benchmark
  description: >
     Evaluation of Hybrid Hash (SHA-256 XOR BLAKE3) Performance.
  workers:
    type: local
    number: 8
  rounds:
    # --- Round 1: IssueCertificate (Fixed 50 TPS) ---
    - label: IssueCertificate
      description: Org1 issues certificates using the Hybrid Hash.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
      postIterationWaitTime: 20000

    # --- Round 2: VerifyCertificate (Fixed 100 TPS) ---
    - label: VerifyCertificate
      description: Verify certificate authenticity via read-only peer query.
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      postIterationWaitTime: 15000

    # --- Round 3: QueryAllCertificates (Fixed 50 TPS) ---
    - label: QueryAllCertificates
      description: Rich ledger query returning all certificates.
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/queryAllCertificates.js
      postIterationWaitTime: 15000

    # --- Round 4: RevokeCertificate (Fixed 50 TPS) ---
    - label: RevokeCertificate
      description: Org2 revokes certificates (RBAC write operation).
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/revokeCertificate.js
      postIterationWaitTime: 20000

    # --- Round 5: GetCertificatesByStudent (Fixed 75 TPS) ---
    - label: GetCertificatesByStudent
      description: Query certificates for a specific student using CouchDB index.
      txNumber: 2250
      rateControl:
        type: fixed-rate
        opts:
          tps: 75
      workload:
        module: workload/getCertificatesByStudent.js
      postIterationWaitTime: 15000

    # --- Round 6: GetAuditLogs (Fixed 30 TPS) ---
    - label: GetAuditLogs
      description: Retrieve paginated audit logs via AUDIT_ range scan.
      txNumber: 900
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/getAuditLogs.js
      postIterationWaitTime: 10000

    # ========================================================================
    # Phase 3 — Batch Operations (mirage-batch branch)
    # ========================================================================
    # RESEARCH COMPARISON:
    #   Rounds 1-6: Individual operations (Baseline)
    #   Rounds 7-9: Batch operations (Batch Size = 5)
    #
    # Fair comparison: same total certificates processed, fewer transactions.
    #   Round 7 vs Round 1: 300 txs x 5 = 1500 certs (same as Round 1)
    #   Round 8 vs Round 2: 600 txs x 5 = 3000 certs (same as Round 2)
    #   Round 9 vs Round 4: 300 txs x 5 = 1500 revocations (same as Round 4)
    #
    # Expected improvements:
    #   - 80% fewer orderer round-trips (5x reduction)
    #   - Higher effective throughput (TPS x 5 certs/second)
    #   - Lower MVCC conflict rate (5x fewer concurrent writes)
    #   - Atomic batch semantics (security improvement)
    # ========================================================================

    # --- Round 7: BatchIssueCertificates (20 TPS x 5 = 100 certs/s effective) ---
    - label: BatchIssueCertificates
      description: >
        Phase 3 batch operation. Issues 5 certificates per transaction.
        Effective throughput: 20 TPS x 5 = 100 certificates/second.
        Compare with Round 1 (IssueCertificate) for performance gain analysis.
      txNumber: 300
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/batchIssueCertificate.js
      postIterationWaitTime: 25000

    # --- Round 8: BatchVerifyCertificates (40 TPS x 5 = 200 certs/s effective) ---
    - label: BatchVerifyCertificates
      description: >
        Phase 3 batch verification. Verifies 5 certificates per query (readOnly).
        Effective throughput: 40 TPS x 5 = 200 verifications/second.
        Compare with Round 2 (VerifyCertificate) for performance gain analysis.
      txNumber: 600
      rateControl:
        type: fixed-rate
        opts:
          tps: 40
      workload:
        module: workload/batchVerifyCertificate.js
      postIterationWaitTime: 15000

    # --- Round 9: BatchRevokeCertificates (20 TPS x 5 = 100 certs/s effective) ---
    - label: BatchRevokeCertificates
      description: >
        Phase 3 batch revocation. Revokes 5 certificates per transaction.
        Targets the BCERT_ IDs issued in Round 7.
        Atomic revocation prevents partial-revoke security vulnerabilities.
        Compare with Round 4 (RevokeCertificate) for performance gain analysis.
      txNumber: 300
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/batchRevokeCertificate.js
      postIterationWaitTime: 25000

