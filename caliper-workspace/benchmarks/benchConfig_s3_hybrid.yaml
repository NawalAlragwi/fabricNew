# ============================================================================
#  BCMS — Scenario S3: Hybrid (SHA-256 + BLAKE3), No Batch  (v6.2)
#  Hash algorithm : Hybrid — BLAKE3(SHA-256(data))
#  Batch size     : 1 (one certificate per Fabric transaction)
#  Workers        : 5 (local)
#  TPS Target     : 200 (Standardized for fair comparison)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1

test:
  name: bcms-s3-hybrid-fixed-200tps
  description: >
    Scenario S3 — Hybrid Hash, No Batching. Specialized for academic comparison.
    TPS fixed at 200 for all rounds. Added index warm-up phase.
  workers:
    type: local
    number: 8

  rounds:
    # ── ROUND 1: ISSUANCE ──────────────────────────────────────────────────
    - label: IssueCertificate
      description: Issue single certificates at fixed 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          startingTps: 50
          finishingTps: 200
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── ROUND 2: VERIFICATION ──────────────────────────────────────────────
    - label: VerifyCertificate
      description: Read-only verification at 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── ROUND 3: INDEX WARM-UP (PREVENTS TIMEOUTS) ─────────────────────────
    - label: WarmupIndexing
      description: Trigger CouchDB index building before high-load query.
      txDuration: 20
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── ROUND 4: FULL QUERY ────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: Query with 200 TPS (limited to 100 results per tx).
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ── ROUND 5: REVOCATION ────────────────────────────────────────────────
    - label: RevokeCertificate
      description: Mark certificates as revoked at 200 TPS.
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com
