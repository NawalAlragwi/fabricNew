# ============================================================================
#  BCMS Benchmark — Scenario 3: Hybrid SHA-256 + BLAKE3
#  Single certificate per transaction, hybrid double-lock hashing.
#  Chaincode: chaincode-bcms/hybrid-batch (batchSize=1)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - peer0.org2.example.com

test:
  name: bcms-s3-hybrid-no-batch
  description: >
    Hybrid double-lock hashing benchmark: BLAKE3(SHA-256(data)).
    Single-certificate issuance — no batching optimization.
    Measures combined SHA-256+BLAKE3 overhead vs single-hash modes.
  workers:
    type: local
    number: 4

  rounds:

    - label: IssueCertificate
      description: Issue single certs using hybrid SHA-256+BLAKE3 hash.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: VerifyCertificate
      description: Verify certificate (hybrid hash mode, existence check).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: QueryAllCertificates
      description: Full ledger scan (hybrid mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: RevokeCertificate
      description: Revoke certificates (hybrid mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    - label: GetCertificatesByStudent
      description: Per-student query (hybrid mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    - label: GetAuditLogs
      description: Audit trail query (hybrid mode).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
