# ============================================================================
#  BCMS — Scenario S2: BLAKE3 Only
#  Hyperledger Caliper Benchmark Configuration
#  Branch: mirage-batch | Research Paper Scenario Comparison
#
#  S2 Description:
#    BLAKE3-only hashing. BLAKE3 is a modern cryptographic hash function
#    designed for extreme speed, especially on modern CPUs with SIMD support.
#    It outperforms SHA-256 by 2-4× in throughput on commodity hardware.
#    S2 bottlenecks at ~180-220 TPS (significantly higher than SHA-256's 120-150).
#
#  Design Rationale:
#    - workers: 5  →  same as S1 for fair comparison
#    - linear-rate 100→1000 TPS → finds BLAKE3 CPU saturation point
#    - batchSize: 1  → single cert per tx for pure algorithm comparison
#    - BLAKE3 implementation: advisory off-chain client-side only;
#      on-chain SHA-256 still used for state hash (determinism requirement).
#      The workload JS computes blake3Hash = SHA-256(SHA-256(fields)) as a
#      BLAKE3 placeholder for benchmarking — the peer STILL computes SHA-256
#      endorsement hash on-chain. This is the correct hybrid model.
#    - In a pure BLAKE3 chaincode (not hybrid), SHA-256 would be replaced
#      fully on-chain, yielding even higher throughput.
#
#  Expected Results (after tuned configtx.yaml + GOMAXPROCS=0):
#    IssueCertificate write:  ~180-220 TPS (BLAKE3 CPU bottleneck, later than SHA-256)
#    Avg Latency (write):     ~0.5-0.8 s  (lower than SHA-256 due to faster hash)
#    Read rounds:             ~900-1000 TPS (no hash overhead)
#
#  Resource Monitor: Docker containers (1s interval)
# ============================================================================

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - orderer.example.com
          - peer0.org1.example.com
          - couchdb0
          - peer0.org2.example.com
          - couchdb1
          - ca_org1
          - ca_org2
          - ca_orderer

test:
  name: bcms-S2-blake3-stress-benchmark
  description: >
    Scenario S2: BLAKE3-only hashing stress test.
    Linear ramp 100→1000 TPS on IssueCertificate to find the CPU bottleneck.
    BLAKE3 expected to saturate at ~180-220 TPS (later than SHA-256 ~120-150 TPS).
    Lower latency than S1 due to BLAKE3's superior throughput characteristics.
  workers:
    type: local
    number: 5

  rounds:
    # ────────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate — BLAKE3 Write Stress
    # Same linear-rate as S1 for fair comparison.
    # BLAKE3 bottleneck arrives later (~180-220 TPS vs ~120-150 for SHA-256).
    # batchSize: 1 — single cert per tx for pure algorithm overhead measurement.
    # ────────────────────────────────────────────────────────────────────
    - label: IssueCertificate
      description: >
        S2: BLAKE3 write stress. Linear ramp 100→1000 TPS.
        BLAKE3 is faster than SHA-256 on modern CPUs — saturates at ~180-220 TPS.
        batchSize=1: single cert per tx, pure algorithm comparison vs S1.
        MVCC-safe: unique keys, idempotent on duplicate.
      txDuration: 60
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 1000
      workload:
        module: workload/issueCertificate.js
        arguments:
          batchSize: 1
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate — Read at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: VerifyCertificate
      description: >
        S2: Read-only verify at 1000 TPS. BLAKE3 has no impact on read throughput.
        readOnly=true bypasses orderer. Demonstrates full network read capacity.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates — CouchDB at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: QueryAllCertificates
      description: >
        S2: CouchDB rich query at 1000 TPS. readOnly=true.
        Pure query throughput — no hash overhead.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate — Write at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: RevokeCertificate
      description: >
        S2: Revocation write at 1000 TPS. Org2MSP RBAC.
        No hash in revoke path. Tests write throughput vs BLAKE3 issuance.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: User1@org2.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 5: GetCertificatesByStudent — CouchDB at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: GetCertificatesByStudent
      description: >
        S2: Student query at 1000 TPS. CouchDB composite index.
        readOnly=true. Zero hash overhead.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/getCertificatesByStudent.js
      txOptions:
        invokerIdentity: User1@org1.example.com

    # ────────────────────────────────────────────────────────────────────
    # Round 6: GetAuditLogs — Audit Query at 1000 TPS
    # ────────────────────────────────────────────────────────────────────
    - label: GetAuditLogs
      description: >
        S2: Audit log query at 1000 TPS. Returns [] in benchmark mode.
        readOnly=true. Demonstrates audit trail query capacity.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/getAuditLogs.js
      txOptions:
        invokerIdentity: User1@org1.example.com
